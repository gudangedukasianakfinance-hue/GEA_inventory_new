<!-- Monitoring Outlet Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Monitoring Outlet</h2>
    <p class="page-subtitle">Monitor stok dan aktivitas outlet</p>
  </div>

  <!-- Outlet Grid -->
  <div class="outlet-grid" id="outletGrid">
    <!-- Outlet cards will be rendered here -->
    <div class="loading-state">Memuat data...</div>
  </div>
</section>

<style>
  .outlet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  
  .outlet-card {
    background: #101827;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    padding: 20px;
  }
  
  .outlet-card__header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  
  .outlet-card__icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(59, 130, 246, 0.12);
    color: #3B82F6;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .outlet-card__name {
    font-weight: 600;
    color: #FFF;
  }
  
  .outlet-card__location {
    font-size: 12px;
    color: #94A3B8;
  }
  
  .outlet-card__stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  
  .outlet-card__stat {
    text-align: center;
    padding: 12px;
    background: rgba(255,255,255,.04);
    border-radius: 10px;
  }
  
  .outlet-card__stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #FFF;
  }
  
  .outlet-card__stat-label {
    font-size: 11px;
    color: #94A3B8;
  }
</style>

<script>
  async function loadMonitoringOutlet() {
    try {
      const response = await fetch('/api/v1/outlet/monitoring');
      if (!response.ok) throw new Error('Failed to load');
      const data = await response.json();
      renderOutletGrid(data.items || []);
    } catch (error) {
      console.error('Error loading outlet:', error);
      document.getElementById('outletGrid').innerHTML = 
        '<div class="error-state">Gagal memuat data</div>';
    }
  }

  function renderOutletGrid(items) {
    const grid = document.getElementById('outletGrid');
    if (items.length === 0) {
      grid.innerHTML = '<div class="empty-state">Tidak ada outlet</div>';
      return;
    }
    
    grid.innerHTML = items.map(item => `
      <div class="outlet-card">
        <div class="outlet-card__header">
          <div class="outlet-card__icon">
            <i data-lucide="store"></i>
          </div>
          <div>
            <div class="outlet-card__name">${item.nama}</div>
            <div class="outlet-card__location">${item.lokasi}</div>
          </div>
        </div>
        <div class="outlet-card__stats">
          <div class="outlet-card__stat">
            <div class="outlet-card__stat-value">${item.total_sku}</div>
            <div class="outlet-card__stat-label">SKU</div>
          </div>
          <div class="outlet-card__stat">
            <div class="outlet-card__stat-value">${item.total_stok}</div>
            <div class="outlet-card__stat-label">Stok</div>
          </div>
        </div>
      </div>
    `).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [grid] });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadMonitoringOutlet);
  } else {
    loadMonitoringOutlet();
  }
</script>
