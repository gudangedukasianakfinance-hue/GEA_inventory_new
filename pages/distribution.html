<!-- Dashboard Distribution Page -->
<section class="distribution-dashboard">
  
  <!-- Welcome Section -->
  <div class="welcome">
    <div class="welcome__content">
      <h1 class="welcome__title" id="distTitle">Dashboard Pengiriman</h1>
      <p class="welcome__subtitle">Monitoring distribusi barang ke outlet</p>
    </div>
    <div class="welcome__filter">
      <div class="cache-status" id="cacheStatus" style="display: none;">
        <i data-lucide="clock"></i>
        <span>Cache: <span id="cacheRemaining">5:00</span></span>
      </div>
      <button class="btn btn--primary" id="refreshBtn">
        <i data-lucide="refresh-cw"></i>
        <span>Refresh Data</span>
      </button>
      <button class="btn btn--success" id="exportBtn">
        <i data-lucide="download"></i>
        <span>Export Excel</span>
      </button>
    </div>
    <div class="welcome__datetime">
      <div class="welcome__date" id="distDate">-</div>
      <div class="welcome__time" id="distTime">--:--:--</div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="distribution-loading-overlay" id="distributionLoadingOverlay" style="display:none;">
    <div class="distribution-loading-spinner"></div>
    <div class="distribution-loading-text">Memuat data...</div>
  </div>

  <!-- Root -->
  <div id="distribution-root"></div>

</section>

<!-- Libraries - Recharts only -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>
<script src="/js/pages/distribution.js"></script>
