<!-- Dashboard Distribution Page -->
<section class="distribution-dashboard">
  
  <!-- Welcome Section -->
  <div class="welcome">
    <div class="welcome__content">
      <h1 class="welcome__title" id="distTitle">Dashboard Pengiriman</h1>
      <p class="welcome__subtitle">Monitoring distribusi barang ke outlet</p>
    </div>
    <div class="welcome__filter">
      <div class="cache-status" id="cacheStatus" style="display: none;">
        <i data-lucide="clock"></i>
        <span>Cache: <span id="cacheRemaining">5:00</span></span>
      </div>
      <button class="btn btn--primary" id="refreshBtn">
        <i data-lucide="refresh-cw"></i>
        <span>Refresh Data</span>
      </button>
      <button class="btn btn--success" id="exportBtn">
        <i data-lucide="download"></i>
        <span>Export Excel</span>
      </button>
    </div>
    <div class="welcome__datetime">
      <div class="welcome__date" id="distDate">-</div>
      <div class="welcome__time" id="distTime">--:--:--</div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="distribution-loading-overlay" id="distributionLoadingOverlay" style="display:none;">
    <div class="distribution-loading-spinner"></div>
    <div class="distribution-loading-text">Memuat data...</div>
  </div>

  <!-- React Root -->
  <div id="distribution-root">
    <!-- Loading State -->
    <div class="distribution-loading">
      <div class="distribution-loading__spinner"></div>
      <p>Memuat komponen...</p>
    </div>
  </div>

</section>

<!-- React & Libraries - Load synchronously in correct order -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/@tanstack/react-table/8.11.0/react-table.production.min.js" defer></script>
<script src="/js/pages/distribution.js" defer></script>
