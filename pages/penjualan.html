<!-- Penjualan Page -->
<section class="page-section">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header__left">
      <h2 class="page-title">Penjualan</h2>
      <p class="page-subtitle">Kelola data penjualan</p>
    </div>
    <div class="page-header__actions">
      <button class="btn btn--secondary" onclick="exportExcel()">
        <i data-lucide="download"></i>
        <span>Export Excel</span>
      </button>
      <button class="btn btn--primary" onclick="showAddModal()">
        <i data-lucide="plus"></i>
        <span>Tambah Penjualan</span>
      </button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Tanggal Awal</label>
      <input type="date" id="filterTanggalAwal" onchange="loadPenjualan()">
    </div>
    <div class="filter-group">
      <label>Tanggal Akhir</label>
      <input type="date" id="filterTanggalAkhir" onchange="loadPenjualan()">
    </div>
    <div class="filter-group">
      <label>Outlet</label>
      <select id="filterOutlet" onchange="loadPenjualan()">
        <option value="">Semua Outlet</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Produk</label>
      <select id="filterProduk" onchange="loadPenjualan()">
        <option value="">Semua Produk</option>
      </select>
    </div>
    <div class="filter-group" style="flex: 1;">
      <label>Search</label>
      <input type="text" id="filterSearch" placeholder="Cari tanggal, outlet, atau SKU..." oninput="debounceSearch()">
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="stats-grid">
    <div class="stats-card">
      <div class="stats-card__icon stats-card__icon--primary">
        <i data-lucide="shopping-cart"></i>
      </div>
      <div class="stats-card__content">
        <div class="stats-card__value" id="summaryTransaksi">0</div>
        <div class="stats-card__label">Total Transaksi</div>
      </div>
    </div>
    <div class="stats-card">
      <div class="stats-card__icon stats-card__icon--success">
        <i data-lucide="package"></i>
      </div>
      <div class="stats-card__content">
        <div class="stats-card__value" id="summaryQty">0</div>
        <div class="stats-card__label">Total Qty</div>
      </div>
    </div>
    <div class="stats-card">
      <div class="stats-card__icon stats-card__icon--warning">
        <i data-lucide="wallet"></i>
      </div>
      <div class="stats-card__content">
        <div class="stats-card__value" id="summaryNominal">Rp 0</div>
        <div class="stats-card__label">Total Nominal</div>
      </div>
    </div>
  </div>

  <!-- Data Table -->
  <div class="card">
    <div class="table-wrapper">
      <table class="data-table" id="penjualanTable">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Outlet</th>
            <th>SKU</th>
            <th>Nama Produk</th>
            <th class="text-right">Qty</th>
            <th class="text-right">Harga</th>
            <th class="text-right">Nominal</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="penjualanTableBody">
          <tr>
            <td colspan="8" class="text-center text-muted">
              <div class="loading-state">
                <div class="spinner"></div>
                <span>Memuat data...</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <!-- Pagination -->
    <div class="pagination" id="paginationContainer">
      <div class="pagination__info" id="paginationInfo">Menampilkan 0 - 0 dari 0 data</div>
      <div class="pagination__buttons" id="paginationButtons"></div>
    </div>
  </div>
</section>

<!-- Add/Edit Modal -->
<div id="penjualanModal" class="modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title" id="modalTitle">Tambah Penjualan</h3>
      <button class="modal__close" onclick="closeModal()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <form id="penjualanForm" onsubmit="savePenjualan(event)">
      <input type="hidden" id="penjualanId">
      <div class="form-group">
        <label>Tanggal <span class="text-danger">*</span></label>
        <input type="date" id="inputTanggal" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Outlet <span class="text-danger">*</span></label>
        <select id="inputOutlet" class="form-input" required>
          <option value="">Pilih Outlet</option>
        </select>
      </div>
      <div class="form-group">
        <label>Produk <span class="text-danger">*</span></label>
        <select id="inputProduk" class="form-input" required onchange="updateHarga()">
          <option value="">Pilih Produk</option>
        </select>
      </div>
      <div class="form-group">
        <label>Harga Jual</label>
        <input type="text" id="inputHarga" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label>Qty <span class="text-danger">*</span></label>
        <input type="number" id="inputQty" class="form-input" min="1" required oninput="updateNominal()">
      </div>
      <div class="form-group">
        <label>Nominal</label>
        <input type="text" id="inputNominal" class="form-input" readonly style="font-weight: 600; color: var(--primary);">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--secondary" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn--primary" id="btnSave">Simpan</button>
      </div>
    </form>
  </div>
</div>

<!-- View Modal -->
<div id="viewModal" class="modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Detail Penjualan</h3>
      <button class="modal__close" onclick="closeViewModal()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal__body">
      <div class="info-list" id="viewContent">
        <!-- Filled by JS -->
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" onclick="closeViewModal()">Tutup</button>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Konfirmasi Hapus</h3>
      <button class="modal__close" onclick="closeDeleteModal()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal__body">
      <p class="text-center">Apakah Anda yakin ingin menghapus penjualan ini?</p>
      <p class="text-center text-muted mt-sm" id="deleteItemInfo"></p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" onclick="closeDeleteModal()">Batal</button>
      <button class="btn btn--danger" onclick="confirmDelete()" id="btnConfirmDelete">
        <i data-lucide="trash-2"></i>
        <span>Hapus</span>
      </button>
    </div>
  </div>
</div>

<style>
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    padding: var(--space-lg);
  }
  
  .text-danger {
    color: var(--danger);
  }
  
  .modal__body .info-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
  }
  
  .modal__body .info-item {
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
  }
  
  .modal__body .info-item__label {
    font-size: 12px;
    color: var(--muted);
  }
  
  .modal__body .info-item__value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  
  .modal__body .info-item--full {
    grid-column: span 2;
  }
</style>

<script>
  // State
  let penjualanList = [];
  let currentPage = 1;
  let totalPages = 1;
  let totalData = 0;
  let editingId = null;
  let deleteId = null;
  let searchTimeout = null;
  let produkList = [];
  let outletList = [];

  // Format currency
  function formatRupiah(num) {
    return 'Rp ' + new Intl.NumberFormat('id-ID').format(num);
  }

  // Format date
  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleDateString('id-ID', { 
      day: '2-digit', 
      month: 'short', 
      year: 'numeric' 
    });
  }

  // Debounced search
  function debounceSearch() {
    if (searchTimeout) clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentPage = 1;
      loadPenjualan();
    }, 300);
  }

  // Get filter params
  function getFilterParams() {
    return {
      page: currentPage,
      limit: 20,
      tanggal_awal: document.getElementById('filterTanggalAwal').value,
      tanggal_akhir: document.getElementById('filterTanggalAkhir').value,
      outlet: document.getElementById('filterOutlet').value,
      sku: document.getElementById('filterProduk').value,
      search: document.getElementById('filterSearch').value
    };
  }

  // Load penjualan data
  async function loadPenjualan() {
    const tbody = document.getElementById('penjualanTableBody');
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="text-center text-muted">
          <div class="loading-state">
            <div class="spinner"></div>
            <span>Memuat data...</span>
          </div>
        </td>
      </tr>
    `;

    try {
      const params = new URLSearchParams(getFilterParams());
      const response = await fetch('/api/v1/penjualan?' + params.toString());
      
      if (!response.ok) throw new Error('Failed to load');
      
      const result = await response.json();
      
      if (!result.success) throw new Error(result.message || 'Load failed');
      
      penjualanList = result.data || [];
      totalData = result.pagination?.total || 0;
      totalPages = result.pagination?.total_pages || 1;
      
      // Update summary
      updateSummary(result.data);
      
      // Render table
      renderTable();
      
      // Update pagination
      updatePagination();
    } catch (error) {
      console.error('Error loading penjualan:', error);
      tbody.innerHTML = `
        <tr>
          <td colspan="8" class="text-center text-danger">
            Gagal memuat data: ${error.message}
          </td>
        </tr>
      `;
    }
  }

  // Update summary cards
  function updateSummary(data) {
    const totalTransaksi = data.length;
    const totalQty = data.reduce((sum, item) => sum + (parseInt(item.qty) || 0), 0);
    const totalNominal = data.reduce((sum, item) => sum + (parseFloat(item.nominal) || 0), 0);
    
    document.getElementById('summaryTransaksi').textContent = totalTransaksi.toLocaleString('id-ID');
    document.getElementById('summaryQty').textContent = totalQty.toLocaleString('id-ID');
    document.getElementById('summaryNominal').textContent = formatRupiah(totalNominal);
  }

  // Render table
  function renderTable() {
    const tbody = document.getElementById('penjualanTableBody');
    
    if (penjualanList.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="8" class="text-center text-muted">
            <div class="empty-state">
              <i data-lucide="inbox"></i>
              <p class="empty-state__title">Tidak ada data</p>
              <p class="empty-state__desc">Tidak ada penjualan yang sesuai filter</p>
            </div>
          </td>
        </tr>
      `;
      if (window.lucide) lucide.createIcons({ nodes: [tbody] });
      return;
    }
    
    tbody.innerHTML = penjualanList.map(item => `
      <tr>
        <td>${formatDate(item.tanggal)}</td>
        <td>${item.nama_outlet || '-'}</td>
        <td><code>${item.sku || '-'}</code></td>
        <td>${item.nama_produk || '-'}</td>
        <td class="text-right">${(item.qty || 0).toLocaleString('id-ID')}</td>
        <td class="text-right">${formatRupiah(parseFloat(item.harga_jual) || 0)}</td>
        <td class="text-right" style="color: var(--primary); font-weight: 600;">
          ${formatRupiah(parseFloat(item.nominal) || 0)}
        </td>
        <td>
          <div class="action-buttons">
            <button class="action-btn" onclick="viewPenjualan(${item.id})" title="Lihat">
              <i data-lucide="eye"></i>
            </button>
            <button class="action-btn" onclick="editPenjualan(${item.id})" title="Edit">
              <i data-lucide="edit-2"></i>
            </button>
            <button class="action-btn action-btn--danger" onclick="deletePenjualan(${item.id})" title="Hapus">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  // Update pagination UI
  function updatePagination() {
    const info = document.getElementById('paginationInfo');
    const buttons = document.getElementById('paginationButtons');
    const limit = 20;
    const start = (currentPage - 1) * limit + 1;
    const end = Math.min(currentPage * limit, totalData);
    
    info.textContent = `Menampilkan ${start} - ${end} dari ${totalData.toLocaleString('id-ID')} data`;
    
    // Generate page buttons
    let pageButtons = '';
    
    // Prev button
    pageButtons += `
      <button class="pagination__btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
        <i data-lucide="chevron-left"></i>
      </button>
    `;
    
    // Page numbers
    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    
    if (endPage - startPage < maxVisible - 1) {
      startPage = Math.max(1, endPage - maxVisible + 1);
    }
    
    if (startPage > 1) {
      pageButtons += `<button class="pagination__btn" onclick="goToPage(1)">1</button>`;
      if (startPage > 2) pageButtons += `<span class="pagination__btn" style="cursor: default;">...</span>`;
    }
    
    for (let i = startPage; i <= endPage; i++) {
      pageButtons += `
        <button class="pagination__btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
          ${i}
        </button>
      `;
    }
    
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) pageButtons += `<span class="pagination__btn" style="cursor: default;">...</span>`;
      pageButtons += `<button class="pagination__btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
    }
    
    // Next button
    pageButtons += `
      <button class="pagination__btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
        <i data-lucide="chevron-right"></i>
      </button>
    `;
    
    buttons.innerHTML = pageButtons;
    if (window.lucide) lucide.createIcons({ nodes: [buttons] });
  }

  // Go to page
  function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    loadPenjualan();
  }

  // Load outlet list for dropdowns
  async function loadOutlets() {
    try {
      const response = await fetch('/api/outlet-list');
      if (!response.ok) throw new Error('Failed to load outlets');
      
      outletList = await response.json();
      
      // Populate filter outlet
      const filterOutlet = document.getElementById('filterOutlet');
      filterOutlet.innerHTML = '<option value="">Semua Outlet</option>' + 
        outletList.map(o => `<option value="${o.nama_outlet}">${o.nama_outlet}</option>`).join('');
      
      // Populate input outlet
      const inputOutlet = document.getElementById('inputOutlet');
      inputOutlet.innerHTML = '<option value="">Pilih Outlet</option>' + 
        outletList.map(o => `<option value="${o.nama_outlet}">${o.nama_outlet}</option>`).join('');
    } catch (error) {
      console.error('Error loading outlets:', error);
    }
  }

  // Load produk list for dropdowns
  async function loadProduk() {
    try {
      const response = await fetch('/api/produk-list');
      if (!response.ok) throw new Error('Failed to load produk');
      
      produkList = await response.json();
      
      // Populate filter produk
      const filterProduk = document.getElementById('filterProduk');
      filterProduk.innerHTML = '<option value="">Semua Produk</option>' + 
        produkList.map(p => `<option value="${p.sku}">${p.sku} - ${p.nama_produk}</option>`).join('');
      
      // Populate input produk
      const inputProduk = document.getElementById('inputProduk');
      inputProduk.innerHTML = '<option value="">Pilih Produk</option>' + 
        produkList.map(p => `<option value="${p.sku}">${p.sku} - ${p.nama_produk}</option>`).join('');
    } catch (error) {
      console.error('Error loading produk:', error);
    }
  }

  // Show add modal
  function showAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Tambah Penjualan';
    document.getElementById('penjualanForm').reset();
    document.getElementById('penjualanId').value = '';
    document.getElementById('inputHarga').value = '';
    document.getElementById('inputNominal').value = '';
    document.getElementById('btnSave').innerHTML = '<i data-lucide="plus"></i><span>Simpan</span>';
    openModal('penjualanModal');
  }

  // View penjualan
  async function viewPenjualan(id) {
    try {
      const response = await fetch('/api/v1/penjualan/' + id);
      if (!response.ok) throw new Error('Failed to load');
      
      const result = await response.json();
      if (!result.success) throw new Error(result.message);
      
      const item = result.data;
      
      document.getElementById('viewContent').innerHTML = `
        <div class="info-item">
          <span class="info-item__label">ID</span>
          <span class="info-item__value">#${item.id}</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Tanggal</span>
          <span class="info-item__value">${formatDate(item.tanggal)}</span>
        </div>
        <div class="info-item info-item--full">
          <span class="info-item__label">Outlet</span>
          <span class="info-item__value">${item.nama_outlet || '-'}</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">SKU</span>
          <span class="info-item__value"><code>${item.sku || '-'}</code></span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Nama Produk</span>
          <span class="info-item__value">${item.nama_produk || '-'}</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Qty</span>
          <span class="info-item__value">${(item.qty || 0).toLocaleString('id-ID')}</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Harga Jual</span>
          <span class="info-item__value">${formatRupiah(parseFloat(item.harga_jual) || 0)}</span>
        </div>
        <div class="info-item info-item--full" style="background: var(--primary); border-radius: var(--radius-md); padding: var(--space-md);">
          <span class="info-item__label" style="color: rgba(255,255,255,0.8);">Total Nominal</span>
          <span class="info-item__value" style="font-size: 20px; font-weight: 700; color: white;">
            ${formatRupiah(parseFloat(item.nominal) || 0)}
          </span>
        </div>
      `;
      
      openModal('viewModal');
    } catch (error) {
      console.error('Error viewing penjualan:', error);
      showToast('Gagal memuat detail penjualan', false);
    }
  }

  // Edit penjualan
  async function editPenjualan(id) {
    try {
      const response = await fetch('/api/v1/penjualan/' + id);
      if (!response.ok) throw new Error('Failed to load');
      
      const result = await response.json();
      if (!result.success) throw new Error(result.message);
      
      const item = result.data;
      
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Penjualan';
      document.getElementById('penjualanId').value = id;
      document.getElementById('inputTanggal').value = item.tanggal ? item.tanggal.split('T')[0] : '';
      document.getElementById('inputOutlet').value = item.nama_outlet || '';
      document.getElementById('inputProduk').value = item.sku || '';
      document.getElementById('inputHarga').value = formatRupiah(parseFloat(item.harga_jual) || 0);
      document.getElementById('inputQty').value = item.qty || 0;
      document.getElementById('inputNominal').value = formatRupiah(parseFloat(item.nominal) || 0);
      document.getElementById('btnSave').innerHTML = '<i data-lucide="save"></i><span>Update</span>';
      
      // Store harga_jual for calculation
      document.getElementById('inputProduk').dataset.harga = item.harga_jual || 0;
      
      openModal('penjualanModal');
    } catch (error) {
      console.error('Error editing penjualan:', error);
      showToast('Gagal memuat data penjualan', false);
    }
  }

  // Close modal
  function closeModal() {
    document.getElementById('penjualanModal').classList.remove('active');
    editingId = null;
  }

  // Close view modal
  function closeViewModal() {
    document.getElementById('viewModal').classList.remove('active');
  }

  // Open modal
  function openModal(modalId) {
    document.getElementById(modalId).classList.add('active');
    if (window.lucide) lucide.createIcons();
  }

  // Update harga when produk changes
  async function updateHarga() {
    const sku = document.getElementById('inputProduk').value;
    if (!sku) {
      document.getElementById('inputHarga').value = '';
      return;
    }
    
    const produk = produkList.find(p => p.sku === sku);
    if (produk) {
      document.getElementById('inputHarga').value = formatRupiah(parseFloat(produk.harga_jual) || 0);
      document.getElementById('inputProduk').dataset.harga = produk.harga_jual || 0;
      updateNominal();
    }
  }

  // Update nominal
  function updateNominal() {
    const harga = parseFloat(document.getElementById('inputProduk').dataset.harga) || 0;
    const qty = parseInt(document.getElementById('inputQty').value) || 0;
    const nominal = harga * qty;
    document.getElementById('inputNominal').value = formatRupiah(nominal);
  }

  // Save penjualan
  async function savePenjualan(event) {
    event.preventDefault();
    
    const data = {
      tanggal: document.getElementById('inputTanggal').value,
      nama_outlet: document.getElementById('inputOutlet').value,
      sku: document.getElementById('inputProduk').value,
      qty: parseInt(document.getElementById('inputQty').value) || 0
    };
    
    if (!data.tanggal || !data.nama_outlet || !data.sku || data.qty <= 0) {
      showToast('Mohon lengkapi semua field yang wajib', false);
      return;
    }
    
    try {
      const url = editingId ? '/api/v1/penjualan/' + editingId : '/api/v1/penjualan';
      const method = editingId ? 'PUT' : 'POST';
      
      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      const result = await response.json();
      
      if (!response.ok || !result.success) {
        throw new Error(result.message || 'Save failed');
      }
      
      showToast(editingId ? 'Penjualan berhasil diupdate' : 'Penjualan berhasil ditambahkan');
      closeModal();
      loadPenjualan();
    } catch (error) {
      console.error('Error saving penjualan:', error);
      showToast(error.message || 'Gagal menyimpan penjualan', false);
    }
  }

  // Delete penjualan
  function deletePenjualan(id) {
    deleteId = id;
    const item = penjualanList.find(p => p.id === id);
    document.getElementById('deleteItemInfo').textContent = item 
      ? `${item.nama_produk || item.sku} - ${item.qty} unit` 
      : `ID: ${id}`;
    openModal('deleteModal');
  }

  // Close delete modal
  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('active');
    deleteId = null;
  }

  // Confirm delete
  async function confirmDelete() {
    if (!deleteId) return;
    
    const btn = document.getElementById('btnConfirmDelete');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div><span>Menghapus...</span>';
    
    try {
      const response = await fetch('/api/v1/penjualan/' + deleteId, {
        method: 'DELETE'
      });
      
      const result = await response.json();
      
      if (!response.ok || !result.success) {
        throw new Error(result.message || 'Delete failed');
      }
      
      showToast('Penjualan berhasil dihapus');
      closeDeleteModal();
      loadPenjualan();
    } catch (error) {
      console.error('Error deleting penjualan:', error);
      showToast(error.message || 'Gagal menghapus penjualan', false);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="trash-2"></i><span>Hapus</span>';
      if (window.lucide) lucide.createIcons();
    }
  }

  // Export to Excel (CSV)
  function exportExcel() {
    const params = new URLSearchParams({ ...getFilterParams(), limit: 10000 });
    const csvContent = [
      ['Tanggal', 'Outlet', 'SKU', 'Nama Produk', 'Qty', 'Harga', 'Nominal'].join(','),
      ...penjualanList.map(item => [
        formatDate(item.tanggal),
        `"${(item.nama_outlet || '').replace(/"/g, '""')}"`,
        item.sku || '',
        `"${(item.nama_produk || '').replace(/"/g, '""')}"`,
        item.qty || 0,
        parseFloat(item.harga_jual) || 0,
        parseFloat(item.nominal) || 0
      ].join(','))
    ].join('\n');
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `penjualan_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
    
    showToast('Export Excel berhasil');
  }

  // Toast notification
  function showToast(message, isSuccess = true) {
    // Check if toast function exists in global scope
    if (typeof window.showToastMessage === 'function') {
      window.showToastMessage(message, isSuccess ? 'success' : 'error');
      return;
    }
    
    // Fallback: create toast manually
    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    
    const toast = document.createElement('div');
    toast.className = `toast toast--${isSuccess ? 'success' : 'error'}`;
    toast.innerHTML = `
      <i data-lucide="${isSuccess ? 'check-circle' : 'alert-circle'}"></i>
      <span>${message}</span>
    `;
    
    container.appendChild(toast);
    if (window.lucide) lucide.createIcons({ nodes: [toast] });
    
    // Trigger animation
    setTimeout(() => toast.classList.add('show'), 10);
    
    // Remove after 3s
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // Initialize
  async function initPenjualanPage() {
    // Set default date range (current month)
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
    document.getElementById('filterTanggalAwal').value = firstDay.toISOString().split('T')[0];
    document.getElementById('filterTanggalAkhir').value = now.toISOString().split('T')[0];
    
    // Load dropdowns first
    await Promise.all([loadOutlets(), loadProduk()]);
    
    // Then load data
    await loadPenjualan();
  }

  // Page load handler
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPenjualanPage);
  } else {
    initPenjualanPage();
  }
</script>
