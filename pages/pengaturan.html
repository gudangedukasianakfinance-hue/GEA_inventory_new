<!-- Pengaturan Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Pengaturan</h2>
    <p class="page-subtitle">Pengaturan aplikasi dan akun</p>
  </div>

  <!-- Settings Tabs -->
  <div class="settings-tabs">
    <button class="settings-tab active" data-tab="profile">
      <i data-lucide="user"></i>
      <span>Profil</span>
    </button>
    <button class="settings-tab" data-tab="security">
      <i data-lucide="shield"></i>
      <span>Keamanan</span>
    </button>
    <button class="settings-tab" data-tab="system">
      <i data-lucide="settings"></i>
      <span>Sistem</span>
    </button>
  </div>

  <!-- Profile Tab -->
  <div id="profileTab" class="settings-content active">
    <div class="card">
      <div class="card__header">
        <h3>Informasi Profil</h3>
      </div>
      <form id="profileForm" onsubmit="saveProfile(event)">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="profileNama" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="profileUsername" class="form-input" readonly>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="profileEmail" class="form-input">
        </div>
        <div class="form-group">
          <label>Role</label>
          <input type="text" id="profileRole" class="form-input" readonly>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary">
            <i data-lucide="save"></i>
            <span>Simpan Perubahan</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Security Tab -->
  <div id="securityTab" class="settings-content" style="display:none;">
    <div class="card">
      <div class="card__header">
        <h3>Ubah Password</h3>
      </div>
      <form id="passwordForm" onsubmit="changePassword(event)">
        <div class="form-group">
          <label>Password Lama</label>
          <input type="password" id="oldPassword" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Password Baru</label>
          <input type="password" id="newPassword" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Konfirmasi Password Baru</label>
          <input type="password" id="confirmPassword" class="form-input" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary">
            <i data-lucide="lock"></i>
            <span>Ubah Password</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- System Tab -->
  <div id="systemTab" class="settings-content" style="display:none;">
    <div class="card">
      <div class="card__header">
        <h3>Informasi Sistem</h3>
      </div>
      <div class="info-list">
        <div class="info-item">
          <span class="info-item__label">Nama Aplikasi</span>
          <span class="info-item__value">PT. GEA Warehouse</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Versi</span>
          <span class="info-item__value">3.0.0</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Environment</span>
          <span class="info-item__value">Production</span>
        </div>
        <div class="info-item">
          <span class="info-item__label">Fitur</span>
          <span class="info-item__value">User Management, Opname Approval, Forecast, Multi Outlet</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header">
        <h3>Status Database</h3>
      </div>
      <div id="dbStatus">
        <div class="status-indicator">
          <span class="status-dot connected"></span>
          <span>Koneksi aktif</span>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
  .settings-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding-bottom: 16px;
  }
  
  .settings-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: transparent;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    color: #94A3B8;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .settings-tab:hover {
    background: rgba(255,255,255,.04);
  }
  
  .settings-tab.active {
    background: rgba(255, 77, 58, 0.12);
    border-color: #FF4D3A;
    color: #FF4D3A;
  }
  
  .settings-content {
    animation: fadeIn 0.3s ease;
  }
  
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #EF4444;
  }
  
  .status-dot.connected {
    background: #22C55E;
  }
</style>

<script>
  // Tab switching
  document.querySelectorAll('.settings-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.settings-content').forEach(c => c.style.display = 'none');
      
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + 'Tab').style.display = 'block';
    });
  });

  // Load profile data
  function loadProfileData() {
    const authUser = localStorage.getItem('auth_user');
    if (authUser) {
      const user = JSON.parse(authUser);
      document.getElementById('profileNama').value = user.nama || '';
      document.getElementById('profileUsername').value = user.username || '';
      document.getElementById('profileEmail').value = user.email || '';
      document.getElementById('profileRole').value = formatRole(user.role) || '';
    }
  }

  function formatRole(role) {
    const roles = {
      'admin': 'Administrator',
      'staff_gudang': 'Staff Gudang',
      'checker_opname': 'Checker Opname'
    };
    return roles[role] || role;
  }

  async function saveProfile(event) {
    event.preventDefault();
    
    const data = {
      nama: document.getElementById('profileNama').value,
      email: document.getElementById('profileEmail').value
    };

    try {
      const response = await fetch('/api/v1/auth/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!response.ok) throw new Error('Failed to save');
      
      // Update localStorage
      const authUser = JSON.parse(localStorage.getItem('auth_user') || '{}');
      localStorage.setItem('auth_user', JSON.stringify({ ...authUser, ...data }));
      
      showToast('Profil berhasil disimpan');
    } catch (error) {
      console.error('Error saving profile:', error);
      showToast('Gagal menyimpan profil', false);
    }
  }

  async function changePassword(event) {
    event.preventDefault();
    
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
      showToast('Password baru tidak cocok', false);
      return;
    }

    try {
      const response = await fetch('/api/v1/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldPassword, newPassword })
      });

      if (!response.ok) throw new Error('Failed to change password');
      
      showToast('Password berhasil diubah');
      document.getElementById('passwordForm').reset();
    } catch (error) {
      console.error('Error changing password:', error);
      showToast('Gagal mengubah password', false);
    }
  }

  // Initialize
  loadProfileData();

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  } else {
    if (window.lucide) lucide.createIcons();
  }
</script>
