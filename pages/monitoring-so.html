<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring SO - CV EPIC Warehouse</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
  <style>
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-card: #334155;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --accent-blue: #3B82F6;
      --accent-green: #22C55E;
      --accent-yellow: #EAB308;
      --accent-red: #EF4444;
      --accent-purple: #8B5CF6;
      --accent-orange: #F97316;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: var(--bg-primary); 
      color: var(--text-primary);
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .page-subtitle {
      color: var(--text-secondary);
      margin-top: 4px;
      font-size: 14px;
    }
    
    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    .filter-bar select {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--bg-card);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid var(--bg-card);
    }
    .stat-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .stat-icon.menunggu { background: rgba(234, 179, 8, 0.15); color: var(--accent-yellow); }
    .stat-icon.diambil { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }
    .stat-icon.proses { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .stat-icon.selesai { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
    
    .stat-content { flex: 1; }
    .stat-value { font-size: 36px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
    
    .table-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--bg-card);
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--bg-card);
    }
    .table-header h3 {
      font-size: 18px;
      font-weight: 600;
    }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 24px; text-align: left; }
    th {
      background: rgba(0,0,0,0.2);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--bg-card);
    }
    td {
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.menunggu { background: rgba(234, 179, 8, 0.2); color: var(--accent-yellow); }
    .badge.diambil { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
    .badge.proses { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
    .badge.selesai { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
    
    .text-muted { color: var(--text-secondary); }
    .text-center { text-align: center; }
    .p-4 { padding: 16px; }
    
    .loading { text-align: center; padding: 48px; color: var(--text-secondary); }
    
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Monitoring SO</h1>
        <p class="page-subtitle">Real-time monitoring task Stock Opname</p>
      </div>
    </div>
    
    <div class="filter-bar">
      <select id="filterBulan">
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6">Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
      <select id="filterTahun"></select>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon menunggu">⏳</div>
        <div class="stat-content">
          <div class="stat-value" id="stat-menunggu">0</div>
          <div class="stat-label">Task Menunggu</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon diambil">🤲</div>
        <div class="stat-content">
          <div class="stat-value" id="stat-diambil">0</div>
          <div class="stat-label">Task Diambil</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon proses">🔄</div>
        <div class="stat-content">
          <div class="stat-value" id="stat-proses">0</div>
          <div class="stat-label">Task Proses</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon selesai">✅</div>
        <div class="stat-content">
          <div class="stat-value" id="stat-selesai">0</div>
          <div class="stat-label">Task Selesai</div>
        </div>
      </div>
    </div>
    
    <div class="table-card">
      <div class="table-header">
        <h3>Rekap per User</h3>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nama User</th>
              <th>Task Diambil</th>
              <th>Task Proses</th>
              <th>Task Selesai</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr>
              <td colspan="4" class="loading">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script>
    // Initialize filter
    const now = new Date();
    document.getElementById('filterBulan').value = now.getMonth() + 1;
    
    const tahunSelect = document.getElementById('filterTahun');
    for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      if (y === now.getFullYear()) opt.selected = true;
      tahunSelect.appendChild(opt);
    }
    
    // Load monitoring data
    async function loadMonitoringData() {
      const bulan = document.getElementById('filterBulan').value;
      const tahun = document.getElementById('filterTahun').value;
      
      try {
        const response = await fetch(`/api/opname-perintah?action=monitoring&bulan=${bulan}&tahun=${tahun}`);
        if (!response.ok) throw new Error('Gagal memuat data');
        
        const result = await response.json();
        
        // Update stats
        const summary = result.status_summary || { menunggu: 0, claimed: 0, proses: 0, selesai: 0 };
        document.getElementById('stat-menunggu').textContent = summary.menunggu;
        document.getElementById('stat-diambil').textContent = summary.claimed;
        document.getElementById('stat-proses').textContent = summary.proses;
        document.getElementById('stat-selesai').textContent = summary.selesai;
        
        // Update table
        const tbody = document.getElementById('userTableBody');
        const users = result.user_summary || [];
        
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted p-4">Belum ada data</td></tr>';
        } else {
          tbody.innerHTML = users.map(user => `
            <tr>
              <td><strong>${user.checker}</strong></td>
              <td><span class="badge diambil">${user.claimed}</span></td>
              <td><span class="badge proses">${user.proses}</span></td>
              <td><span class="badge selesai">${user.selesai}</span></td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('userTableBody').innerHTML = 
          '<tr><td colspan="4" class="text-center text-muted p-4">Gagal memuat data</td></tr>';
      }
    }
    
    // Event listeners
    document.getElementById('filterBulan').addEventListener('change', loadMonitoringData);
    document.getElementById('filterTahun').addEventListener('change', loadMonitoringData);
    
    // Initial load
    loadMonitoringData();
  </script>
</body>
</html>
