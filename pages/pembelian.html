<!-- Pembelian Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Pembelian</h2>
    <p class="page-subtitle">Kelola transaksi pembelian barang</p>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" style="background: rgba(59, 130, 246, 0.12); color: #3B82F6;">
        <i data-lucide="shopping-bag"></i>
      </div>
      <div class="kpi-label">Total Pembelian</div>
      <div class="kpi-value" id="totalPembelian">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" style="background: rgba(34, 197, 94, 0.12); color: #22C55E;">
        <i data-lucide="trending-up"></i>
      </div>
      <div class="kpi-label">Bulan Ini</div>
      <div class="kpi-value" id="pembelianBulanIni">-</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="page-actions">
    <button class="btn btn--primary" onclick="showTambahPembelian()">
      <i data-lucide="plus"></i>
      <span>Tambah Pembelian</span>
    </button>
  </div>

  <!-- Purchases Table -->
  <div class="card">
    <table class="data-table" id="pembelianTable">
      <thead>
        <tr>
          <th>No. Faktur</th>
          <th>Tanggal</th>
          <th>Supplier</th>
          <th>Total Item</th>
          <th>Total Harga</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="pembelianTableBody">
        <tr>
          <td colspan="7" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<script>
  async function loadPembelian() {
    try {
      const response = await fetch('/api/v1/pembelian');
      if (!response.ok) throw new Error('Failed to load');
      const data = await response.json();
      
      document.getElementById('totalPembelian').textContent = data.total || 0;
      document.getElementById('pembelianBulanIni').textContent = data.bulan_ini || 0;
      
      renderPembelianTable(data.items || []);
    } catch (error) {
      console.error('Error loading pembelian:', error);
    }
  }

  function renderPembelianTable(items) {
    const tbody = document.getElementById('pembelianTableBody');
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Tidak ada data</td></tr>';
      return;
    }
    
    tbody.innerHTML = items.map(item => `
      <tr>
        <td><code>${item.no_faktur}</code></td>
        <td>${item.tanggal}</td>
        <td>${item.supplier}</td>
        <td>${item.total_item}</td>
        <td>${formatCurrency(item.total_harga)}</td>
        <td><span class="badge badge--${item.status}">${item.status}</span></td>
        <td>
          <button class="action-btn" onclick="viewPembelian('${item.id}')">
            <i data-lucide="eye"></i>
          </button>
        </td>
      </tr>
    `).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  function showTambahPembelian() {
    AppRouter.navigateTo('pembelian-form');
  }

  function viewPembelian(id) {
    console.log('View:', id);
  }

  function formatCurrency(num) {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(num);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPembelian);
  } else {
    loadPembelian();
  }
</script>
