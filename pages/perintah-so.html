<!-- Perintah SO Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Perintah Stok Opname</h2>
    <p class="page-subtitle">Buat dan kelola perintah stok opname</p>
  </div>

  <!-- Actions -->
  <div class="page-actions">
    <button class="btn btn--primary" onclick="showBuatPerintah()">
      <i data-lucide="plus"></i>
      <span>Buat Perintah SO</span>
    </button>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-action-btn" onclick="AppRouter.navigateTo('pelaksanaan-so')">
      <i data-lucide="clipboard-check"></i>
      <span>Pelaksanaan SO</span>
    </button>
    <button class="quick-action-btn" onclick="AppRouter.navigateTo('riwayat-so')">
      <i data-lucide="history"></i>
      <span>Riwayat SO</span>
    </button>
  </div>

  <!-- Perintah List -->
  <div class="card">
    <div class="card__header">
      <h3>Daftar Perintah SO</h3>
    </div>
    <table class="data-table" id="perintahTable">
      <thead>
        <tr>
          <th>Kode SO</th>
          <th>Tanggal</th>
          <th>SVP</th>
          <th>Lokasi</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="perintahTableBody">
        <tr>
          <td colspan="6" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Buat Perintah Modal -->
<div id="buatPerintahModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Buat Perintah SO</h3>
      <button class="modal__close" onclick="closeBuatPerintah()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <form id="perintahForm" onsubmit="savePerintah(event)">
      <div class="form-group">
        <label>Kode SO</label>
        <input type="text" id="perintahKode" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="perintahTanggal" class="form-input" required>
      </div>
      <div class="form-group">
        <label>SVP / Supervisor</label>
        <input type="text" id="perintahSvp" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Lokasi / Gudang</label>
        <select id="perintahLokasi" class="form-input" required>
          <option value="gudang-utama">Gudang Utama</option>
        </select>
      </div>
      <div class="form-group">
        <label>Kategori</label>
        <select id="perintahKategori" class="form-input" required>
          <option value="seragam">Seragam</option>
          <option value="poster">Poster</option>
          <option value="lain">Lain-lain</option>
          <option value="all">Semua</option>
        </select>
      </div>
      <div class="form-group">
        <label>Keterangan</label>
        <textarea id="perintahKeterangan" class="form-input" rows="3"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--secondary" onclick="closeBuatPerintah()">Batal</button>
        <button type="submit" class="btn btn--primary">Simpan</button>
      </div>
    </form>
  </div>
</div>

<script>
  let perintahList = [];

  async function loadPerintah() {
    try {
      const response = await fetch('/api/v1/opname/perintah');
      if (!response.ok) throw new Error('Failed to load');
      perintahList = await response.json();
      renderPerintahTable();
    } catch (error) {
      console.error('Error loading perintah:', error);
    }
  }

  function renderPerintahTable() {
    const tbody = document.getElementById('perintahTableBody');
    if (perintahList.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Tidak ada perintah</td></tr>';
      return;
    }
    
    tbody.innerHTML = perintahList.map(item => `
      <tr>
        <td><code>${item.kode}</code></td>
        <td>${item.tanggal}</td>
        <td>${item.svp}</td>
        <td>${item.lokasi}</td>
        <td><span class="badge badge--${item.status}">${item.status}</span></td>
        <td>
          <button class="action-btn" onclick="executePerintah('${item.id}')">
            <i data-lucide="play"></i>
          </button>
        </td>
      </tr>
    `).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  function showBuatPerintah() {
    // Generate kode
    const kode = 'SO' + new Date().getTime().toString().slice(-6);
    document.getElementById('perintahKode').value = kode;
    document.getElementById('perintahTanggal').value = new Date().toISOString().split('T')[0];
    document.getElementById('buatPerintahModal').style.display = 'flex';
  }

  function closeBuatPerintah() {
    document.getElementById('buatPerintahModal').style.display = 'none';
  }

  async function savePerintah(event) {
    event.preventDefault();
    
    const data = {
      kode: document.getElementById('perintahKode').value,
      tanggal: document.getElementById('perintahTanggal').value,
      svp: document.getElementById('perintahSvp').value,
      lokasi: document.getElementById('perintahLokasi').value,
      kategori: document.getElementById('perintahKategori').value,
      keterangan: document.getElementById('perintahKeterangan').value
    };

    try {
      const response = await fetch('/api/v1/opname/perintah', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!response.ok) throw new Error('Failed to save');
      
      showToast('Perintah SO berhasil dibuat');
      closeBuatPerintah();
      loadPerintah();
    } catch (error) {
      console.error('Error saving:', error);
      showToast('Gagal menyimpan', false);
    }
  }

  function executePerintah(id) {
    AppRouter.navigateTo('pelaksanaan-so');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPerintah);
  } else {
    loadPerintah();
  }
</script>
