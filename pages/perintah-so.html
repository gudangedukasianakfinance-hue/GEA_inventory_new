<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perintah SO</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
  <style>
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .table th { background: #f9fafb; font-weight: 600; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .badge-menunggu { background: #fef3c7; color: #92400e; }
    .badge-proses { background: #dbeafe; color: #1e40af; }
    .badge-selesai { background: #d1fae5; color: #065f46; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; padding: 24px; border-radius: 12px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Perintah SO</h1>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Buat Perintah</button>
    </div>
    
    <div class="filters">
      <select id="filterBulan">
        <option value="6">Juni</option>
      </select>
      <select id="filterTahun">
        <option value="2026">2026</option>
      </select>
      <button class="btn btn-secondary" onclick="loadList()">Cari</button>
    </div>
    
    <table class="table" id="soTable">
      <thead>
        <tr>
          <th>Kode SO</th>
          <th>Kategori</th>
          <th>PIC</th>
          <th>Target</th>
          <th>Checked</th>
          <th>Progress</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="soTableBody"></tbody>
    </table>
  </div>
  
  <div class="modal" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Buat Perintah SO</h2>
        <button class="close-btn" onclick="closeCreateModal()">&times;</button>
      </div>
      <form id="createForm">
        <div class="form-group">
          <label>Kode SO</label>
          <input type="text" id="kodeSo" required placeholder="Contoh: SO26061664">
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select id="kategoriId" required>
            <option value="modul">Modul</option>
            <option value="poster">Poster</option>
            <option value="seragam">Seragam</option>
            <option value="lain-lain">Lain-Lain</option>
          </select>
        </div>
        <div class="form-group">
          <label>PIC Checker</label>
          <input type="text" id="picChecker" required placeholder="Nama PIC">
        </div>
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="tanggal" required>
        </div>
        <div class="form-group">
          <label>Lokasi</label>
          <input type="text" id="lokasi" placeholder="Lokasi SO">
        </div>
        <div class="form-group">
          <label>Keterangan</label>
          <input type="text" id="keterangan" placeholder="Keterangan">
        </div>
        <button type="submit" class="btn btn-primary">Simpan</button>
      </form>
    </div>
  </div>
  
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Detail SO</h2>
        <button class="close-btn" onclick="closeDetailModal()">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const API = '/api/opname-perintah';
    
    async function loadList() {
      const bulan = document.getElementById('filterBulan').value;
      const tahun = document.getElementById('filterTahun').value;
      
      try {
        const res = await fetch(`${API}?bulan=${bulan}&tahun=${tahun}`);
        const data = await res.json();
        
        const tbody = document.getElementById('soTableBody');
        tbody.innerHTML = '';
        
        if (!data.items || !data.items.length) {
          tbody.innerHTML = '<tr><td colspan="8">Tidak ada data</td></tr>';
          return;
        }
        
        data.items.forEach(item => {
          const progress = item.progress_percent || 0;
          const badgeClass = item.status === 'menunggu' ? 'badge-menunggu' : item.status === 'proses' ? 'badge-proses' : 'badge-selesai';
          tbody.innerHTML += `
            <tr>
              <td><strong>${item.kode_so}</strong></td>
              <td>${item.kategori_nama || '-'}</td>
              <td>${item.pic_checker || item.checker || '-'}</td>
              <td>${item.target_sku || 0}</td>
              <td>${item.checked_sku || 0}</td>
              <td>${progress}%</td>
              <td><span class="badge ${badgeClass}">${item.status}</span></td>
              <td>
                <button class="btn btn-secondary" onclick="viewDetail(${item.id})">Detail</button>
                ${item.status === 'menunggu' ? `<button class="btn btn-primary" onclick="startSo(${item.id})">Mulai</button>` : ''}
              </td>
            </tr>
          `;
        });
      } catch (err) {
        console.error('Load list error:', err);
        alert('Gagal memuat data');
      }
    }
    
    function openCreateModal() {
      document.getElementById('createForm').reset();
      document.getElementById('createModal').classList.add('active');
      document.getElementById('kodeSo').value = 'SO' + new Date().toISOString().slice(2,10).replace(/-/g,'');
      document.getElementById('tanggal').value = new Date().toISOString().slice(0,10);
    }
    
    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('active');
    }
    
    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
    }
    
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        kode_so: document.getElementById('kodeSo').value,
        kategori_id: document.getElementById('kategoriId').value,
        pic_checker: document.getElementById('picChecker').value,
        tanggal_perintah: document.getElementById('tanggal').value,
        lokasi: document.getElementById('lokasi').value,
        keterangan: document.getElementById('keterangan').value
      };
      
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if (res.ok) {
          alert('Berhasil dibuat');
          closeCreateModal();
          loadList();
        } else {
          alert('Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        console.error('Create error:', err);
        alert('Gagal membuat perintah');
      }
    });
    
    async function viewDetail(id) {
      try {
        const res = await fetch(`${API}?id=${id}`);
        const data = await res.json();
        
        if (!res.ok) {
          alert('Data tidak ditemukan');
          return;
        }
        
        const badgeClass = data.status === 'menunggu' ? 'badge-menunggu' : data.status === 'proses' ? 'badge-proses' : 'badge-selesai';
        
        document.getElementById('detailContent').innerHTML = `
          <div class="detail-item"><strong>Kode SO:</strong> ${data.kode_so}</div>
          <div class="detail-item"><strong>Kategori:</strong> ${data.kategori_nama || '-'}</div>
          <div class="detail-item"><strong>PIC Checker:</strong> ${data.pic_checker || data.checker || '-'}</div>
          <div class="detail-item"><strong>Target SKU:</strong> ${data.target_sku || 0}</div>
          <div class="detail-item"><strong>Checked SKU:</strong> ${data.checked_sku || 0}</div>
          <div class="detail-item"><strong>Progress:</strong> ${data.progress_percent || 0}%</div>
          <div class="detail-item"><strong>Status:</strong> <span class="badge ${badgeClass}">${data.status}</span></div>
          <div class="detail-item"><strong>Keterangan:</strong> ${data.keterangan || '-'}</div>
        `;
        
        document.getElementById('detailModal').classList.add('active');
      } catch (err) {
        console.error('Detail error:', err);
        alert('Gagal memuat detail');
      }
    }
    
    async function startSo(id) {
      if (!confirm('Mulai SO ini?')) return;
      
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'start', perintah_id: id })
        });
        
        if (res.ok) {
          alert('SO dimulai');
          loadList();
        } else {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        console.error('Start error:', err);
        alert('Gagal memulai SO');
      }
    }
    
    loadList();
  </script>
</body>
</html>
