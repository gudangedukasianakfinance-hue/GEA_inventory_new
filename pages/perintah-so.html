<!-- Perintah SO Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Perintah Stok Opname</h2>
    <p class="page-subtitle">Buat dan kelola perintah stok opname gudang</p>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-action-btn" onclick="AppRouter.navigateTo('pelaksanaan-so')">
      <i data-lucide="clipboard-check"></i>
      <span>Pelaksanaan SO</span>
    </button>
    <button class="quick-action-btn" onclick="AppRouter.navigateTo('riwayat-so')">
      <i data-lucide="history"></i>
      <span>Riwayat SO</span>
    </button>
  </div>

  <!-- Perintah List -->
  <div class="card">
    <div class="card__header">
      <h3>Daftar Perintah SO</h3>
      <button class="btn btn--primary btn--sm" onclick="showBuatPerintah()">
        <i data-lucide="plus"></i>
        <span>Buat Perintah SO</span>
      </button>
    </div>
    <table class="data-table" id="perintahTable">
      <thead>
        <tr>
          <th>Kode SO</th>
          <th>Tanggal</th>
          <th>Kategori</th>
          <th>Target</th>
          <th>Dicek</th>
          <th>Progress</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="perintahTableBody">
        <tr>
          <td colspan="9" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Buat Perintah Modal -->
<div id="buatPerintahModal" class="modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Buat Perintah SO</h3>
      <button class="modal__close" onclick="closeBuatPerintah()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <form id="perintahForm" onsubmit="savePerintah(event)">
      <div class="form-group">
        <label>Kode SO</label>
        <input type="text" id="perintahKode" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="perintahTanggal" class="form-input" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Bulan</label>
          <select id="perintahBulan" class="form-input" required>
            <option value="1">Januari</option>
            <option value="2">Februari</option>
            <option value="3">Maret</option>
            <option value="4">April</option>
            <option value="5">Mei</option>
            <option value="6">Juni</option>
            <option value="7">Juli</option>
            <option value="8">Agustus</option>
            <option value="9">September</option>
            <option value="10">Oktober</option>
            <option value="11">November</option>
            <option value="12">Desember</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tahun</label>
          <select id="perintahTahun" class="form-input" required>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>SVP / Supervisor</label>
        <input type="text" id="perintahSvp" class="form-input" placeholder="Nama Supervisor" required>
      </div>
      <div class="form-group">
        <label>Kategori</label>
        <select id="perintahKategori" class="form-input" required>
          <option value="modul">Modul</option>
          <option value="seragam">Seragam</option>
          <option value="poster">Poster</option>
          <option value="lain_lain">Lain-lain</option>
        </select>
      </div>
      <div class="form-group">
        <label>Lokasi / Gudang</label>
        <select id="perintahLokasi" class="form-input" required>
          <option value="Gudang Utama">Gudang Utama</option>
        </select>
      </div>
      <div class="form-group">
        <label>Keterangan</label>
        <textarea id="perintahKeterangan" class="form-input" rows="2" placeholder="Catatan tambahan (opsional)"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--secondary" onclick="closeBuatPerintah()">Batal</button>
        <button type="submit" class="btn btn--primary">Simpan</button>
      </div>
    </form>
  </div>
</div>

<!-- Detail Perintah Modal -->
<div id="detailPerintahModal" class="modal-overlay">
  <div class="modal modal--lg">
    <div class="modal__header">
      <h3 class="modal__title">Detail Perintah SO</h3>
      <button class="modal__close" onclick="closeDetailPerintah()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal__body">
      <div class="detail-grid">
        <div class="detail-item">
          <label>Kode SO</label>
          <span id="detailKode" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <label>Tanggal</label>
          <span id="detailTanggal" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <label>Periode</label>
          <span id="detailPeriode" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <label>SVP / Supervisor</label>
          <span id="detailSvp" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <label>Kategori</label>
          <span id="detailKategori" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <label>Lokasi</label>
          <span id="detailLokasi" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <label>Status</label>
          <span id="detailStatus" class="detail-badge"></span>
        </div>
      </div>
      
      <div class="detail-progress">
        <div class="progress-header">
          <span>Progress Stok Opname</span>
          <span id="detailProgressText">0 / 0 SKU</span>
        </div>
        <div class="progress-bar">
          <div id="detailProgressBar" class="progress-bar__fill" style="width: 0%"></div>
        </div>
        <div class="progress-stats">
          <div class="stat">
            <span class="stat-label">Target SKU</span>
            <span id="detailTargetSku" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Sudah Dicek</span>
            <span id="detailCheckedSku" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Persentase</span>
            <span id="detailPercent" class="stat-value">0%</span>
          </div>
        </div>
      </div>
      
      <div class="detail-item full-width">
        <label>Keterangan</label>
        <span id="detailKeterangan" class="detail-value detail-value--muted">-</span>
      </div>
    </div>
    <div class="modal__footer">
      <button type="button" class="btn btn--secondary" onclick="closeDetailPerintah()">Tutup</button>
      <button type="button" id="detailActionBtn" class="btn btn--primary" onclick="">
        <i data-lucide="play"></i>
        <span>Mulai SO</span>
      </button>
    </div>
  </div>
</div>

<script>
  // Namespace untuk state (hindari redeclare saat SPA cache reload)
  window.SOPerintah = window.SOPerintah || {};
  window.SOPerintah.perintahList = window.SOPerintah.perintahList || [];

  function formatBulan(bulan) {
    const namaBulan = ['', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                       'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    return namaBulan[bulan] || bulan;
  }

  function getStatusClass(status) {
    const statusMap = {
      'menunggu': 'badge--pending',
      'proses': 'badge--process',
      'selesai': 'badge--done'
    };
    return statusMap[status] || 'badge--pending';
  }

  function getStatusLabel(status) {
    const labelMap = {
      'menunggu': 'Menunggu',
      'proses': 'Proses',
      'selesai': 'Selesai'
    };
    return labelMap[status] || status;
  }

  async function loadPerintah() {
    try {
      // Get current month and year
      const now = new Date();
      const bulan = now.getMonth() + 1;
      const tahun = now.getFullYear();
      
      const response = await fetch(`/api/opname-perintah?bulan=${bulan}&tahun=${tahun}`);
      if (!response.ok) throw new Error('Failed to load');
      
      const data = await response.json();
      window.SOPerintah.perintahList = data.items || [];
      renderPerintahTable();
    } catch (error) {
      console.error('Error loading perintah:', error);
      const tbody = document.getElementById('perintahTableBody');
      if (tbody) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-danger">Gagal memuat data</td></tr>';
      }
    }
  }

  function renderPerintahTable() {
    const tbody = document.getElementById('perintahTableBody');
    if (!tbody) {
      console.warn('perintahTableBody not found');
      return;
    }
    
    if (window.SOPerintah.perintahList.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">Tidak ada perintah SO periode ini</td></tr>';
      return;
    }
    
    tbody.innerHTML = window.SOPerintah.perintahList.map(item => {
      const progress = item.progress_percent || 0;
      const targetSku = item.target_sku || 0;
      const checkedSku = item.checked_sku || 0;
      
      return `
        <tr>
          <td><code>${item.kode_so || item.kode || ''}</code></td>
          <td>${item.tanggal_perintah ? item.tanggal_perintah.slice(0, 10) : '-'}</td>
          <td>${item.kategori_nama || item.kategori || '-'}</td>
          <td>${targetSku}</td>
          <td>${checkedSku}</td>
          <td>
            <div class="progress-bar-mini">
              <div class="progress-bar-mini__fill" style="width: ${progress}%"></div>
            </div>
            <span class="progress-label">${progress.toFixed(1)}%</span>
          </td>
          <td><span class="badge ${getStatusClass(item.status)}">${getStatusLabel(item.status)}</span></td>
          <td>
            <button class="action-btn" onclick="executePerintah(${item.id}, '${item.kode_so || item.kode || ''}')" title="Mulai SO" ${item.status !== 'menunggu' ? 'disabled' : ''}>
              <i data-lucide="play"></i>
            </button>
            <button class="action-btn" onclick="viewPerintah(${item.id})" title="Detail">
              <i data-lucide="eye"></i>
            </button>
            ${item.status === 'menunggu' ? `
            <button class="action-btn action-btn--danger" onclick="deletePerintah(${item.id}, '${item.kode_so || item.kode || ''}')" title="Hapus">
              <i data-lucide="trash-2"></i>
            </button>
            ` : ''}
          </td>
        </tr>
      `;
    }).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  function showBuatPerintah() {
    console.log('=== showBuatPerintah START ===');

    const modal = document.getElementById('buatPerintahModal');
    const loader = document.getElementById('globalLoader');

    console.log('modal:', modal);
    console.log('loader:', loader);

    if (loader) {
      console.log('loader display:', getComputedStyle(loader).display);
      console.log('loader z-index:', getComputedStyle(loader).zIndex);
    }

    if (modal) {
      console.log('modal display before:', getComputedStyle(modal).display);
      console.log('modal z-index:', getComputedStyle(modal).zIndex);
    }

    // Generate kode SO
    const now = new Date();
    const kode = 'SO' + now.getFullYear().toString().slice(-2) + 
                 String(now.getMonth() + 1).padStart(2, '0') + 
                 now.getDate().toString().slice(-2) + 
                 String(Math.floor(Math.random() * 100)).padStart(2, '0');
    
    document.getElementById('perintahKode').value = kode;
    document.getElementById('perintahTanggal').value = now.toISOString().split('T')[0];
    document.getElementById('perintahBulan').value = now.getMonth() + 1;
    document.getElementById('perintahTahun').value = now.getFullYear();
    document.getElementById('perintahSvp').value = '';
    document.getElementById('perintahKeterangan').value = '';
    
    modal.classList.add('active');

    console.log('modal display after:', getComputedStyle(modal).display);

    const rect = modal.getBoundingClientRect();
    console.log('modal rect:', rect);

    console.log('=== showBuatPerintah END ===');
    
    if (window.lucide) lucide.createIcons();
  }

  function closeBuatPerintah() {
    document.getElementById('buatPerintahModal').classList.remove('active');
  }

  async function savePerintah(event) {
    event.preventDefault();
    
    const kodeEl = document.getElementById('perintahKode');
    const tanggalEl = document.getElementById('perintahTanggal');
    const bulanEl = document.getElementById('perintahBulan');
    const tahunEl = document.getElementById('perintahTahun');
    const svpEl = document.getElementById('perintahSvp');
    const lokasiEl = document.getElementById('perintahLokasi');
    const keteranganEl = document.getElementById('perintahKeterangan');
    const kategoriEl = document.getElementById('perintahKategori');
    
    if (!kodeEl || !tanggalEl || !bulanEl || !tahunEl) {
      showToast('Form tidak lengkap', false);
      return;
    }
    
    const data = {
      kode_so: kodeEl.value,
      tanggal_perintah: tanggalEl.value,
      bulan: parseInt(bulanEl.value) || 1,
      tahun: parseInt(tahunEl.value) || new Date().getFullYear(),
      svp_nama: svpEl?.value || '',
      lokasi: lokasiEl?.value || 'Gudang Utama',
      keterangan: keteranganEl?.value || '',
      kategori_id: kategoriEl?.value || 'modul',
      kategori_nama: kategoriEl?.options[kategoriEl.selectedIndex]?.text || 'Modul'
    };

    try {
      const response = await fetch('/api/opname-perintah', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Failed to save');
      }
      
      showToast('Perintah SO berhasil dibuat');
      closeBuatPerintah();
      loadPerintah();
    } catch (error) {
      console.error('Error saving:', error);
      showToast(error.message || 'Gagal menyimpan', false);
    }
  }

  function executePerintah(id, kodeSo) {
    // Find the perintah to get kategori
    const item = window.SOPerintah.perintahList.find(p => p.id === id);
    const kategoriId = item?.kategori_id || 'modul';
    
    // Simpan ID, kode SO, dan kategori ke localStorage untuk diakses di halaman pelaksanaan
    localStorage.setItem('activePerintahId', id);
    localStorage.setItem('activePerintahKode', kodeSo);
    localStorage.setItem('activePerintahKategori', kategoriId);
    AppRouter.navigateTo('pelaksanaan-so');
  }

  function viewPerintah(id) {
    console.log('View perintah:', id);
    
    // Find the perintah item
    const item = window.SOPerintah.perintahList.find(p => p.id === id);
    if (!item) {
      showToast('Data tidak ditemukan', false);
      return;
    }
    
    // Store current detail ID for action button
    window.SOPerintah.currentDetailId = id;
    window.SOPerintah.currentDetailKode = item.kode_so || item.kode || '';
    
    // Populate detail modal
    document.getElementById('detailKode').textContent = item.kode_so || item.kode || '-';
    document.getElementById('detailTanggal').textContent = item.tanggal_perintah ? 
      new Date(item.tanggal_perintah).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : '-';
    
    const bulanNames = ['', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    document.getElementById('detailPeriode').textContent = `${bulanNames[item.bulan] || '-'} ${item.tahun || '-'}`;
    
    document.getElementById('detailSvp').textContent = item.svp_nama || item.svp || '-';
    document.getElementById('detailKategori').textContent = item.kategori_nama || item.kategori || '-';
    document.getElementById('detailLokasi').textContent = item.lokasi || 'Gudang Utama';
    document.getElementById('detailKeterangan').textContent = item.keterangan || '-';
    
    // Status badge
    const statusBadge = document.getElementById('detailStatus');
    statusBadge.textContent = getStatusLabel(item.status);
    statusBadge.className = 'detail-badge badge ' + getStatusClass(item.status);
    
    // Progress
    const targetSku = item.target_sku || 0;
    const checkedSku = item.checked_sku || 0;
    const progress = item.progress_percent || 0;
    
    document.getElementById('detailTargetSku').textContent = targetSku;
    document.getElementById('detailCheckedSku').textContent = checkedSku;
    document.getElementById('detailPercent').textContent = progress.toFixed(1) + '%';
    document.getElementById('detailProgressText').textContent = `${checkedSku} / ${targetSku} SKU`;
    document.getElementById('detailProgressBar').style.width = `${Math.min(progress, 100)}%`;
    
    // Action button based on status
    const actionBtn = document.getElementById('detailActionBtn');
    if (item.status === 'menunggu') {
      actionBtn.innerHTML = '<i data-lucide="play"></i><span>Mulai SO</span>';
      actionBtn.onclick = () => executePerintah(id, item.kode_so || item.kode || '');
      actionBtn.style.display = 'inline-flex';
    } else if (item.status === 'proses') {
      actionBtn.innerHTML = '<i data-lucide="external-link"></i><span>Lihat Pelaksanaan</span>';
      actionBtn.onclick = () => {
        closeDetailPerintah();
        executePerintah(id, item.kode_so || item.kode || '');
      };
      actionBtn.style.display = 'inline-flex';
    } else {
      actionBtn.style.display = 'none';
    }
    
    // Show modal
    document.getElementById('detailPerintahModal').classList.add('active');
    
    if (window.lucide) lucide.createIcons();
  }
  
  function closeDetailPerintah() {
    document.getElementById('detailPerintahModal').classList.remove('active');
  }
  
  async function deletePerintah(id, kodeSo) {
    if (!confirm(`Yakin ingin menghapus Perintah SO "${kodeSo}"?\n\nPerintah yang dihapus tidak dapat dikembalikan.`)) {
      return;
    }
    
    try {
      const response = await fetch(`/api/opname-perintah/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' }
      });
      
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Failed to delete');
      }
      
      showToast(`Perintah SO "${kodeSo}" berhasil dihapus`);
      loadPerintah();
    } catch (error) {
      console.error('Error deleting:', error);
      showToast(error.message || 'Gagal menghapus perintah', false);
    }
  }

  // Load data saat page ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPerintah);
  } else {
    loadPerintah();
  }
</script>

<style>

    display: flex;
    gap: 16px;
  }

  }

    width: 80px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  .progress-bar-mini__fill {
    height: 100%;
    background: linear-gradient(90deg, #FF4D3A, #FF6B5B);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-size: 11px;
    color: #94A3B8;
  }

    background: rgba(148, 163, 184, 0.2);
    color: #94A3B8;
  }
  .badge--process {
    background: rgba(255, 77, 58, 0.2);
    color: #FF4D3A;
  }
  .badge--done {
    background: rgba(34, 197, 94, 0.2);
    color: #22C55E;
  }

    display: flex;
    justify-content: space-between;
    align-items: center;
  }

    max-width: 560px;
  }

    padding: var(--space-xl);
  }

  }
