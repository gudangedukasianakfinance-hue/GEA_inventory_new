<!-- User Management Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Manajemen User</h2>
    <p class="page-subtitle">Kelola pengguna sistem</p>
  </div>

  <!-- Actions -->
  <div class="page-actions">
    <button class="btn btn--primary" onclick="showAddUserModal()">
      <i data-lucide="plus"></i>
      <span>Tambah User</span>
    </button>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Role</label>
      <select id="filterRole">
        <option value="">Semua Role</option>
        <option value="admin">Admin</option>
        <option value="staff_gudang">Staff Gudang</option>
        <option value="checker_opname">Checker</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filterStatus">
        <option value="">Semua Status</option>
        <option value="active">Aktif</option>
        <option value="inactive">Nonaktif</option>
      </select>
    </div>
  </div>

  <!-- Users Table -->
  <div class="card">
    <table class="data-table" id="usersTable">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr>
          <td colspan="6" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Add/Edit User Modal -->
<div id="userModal" class="modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title" id="userModalTitle">Tambah User</h3>
      <button class="modal__close" onclick="closeUserModal()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <form id="userForm" onsubmit="saveUser(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="userUsername" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="userEmail" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="userNama" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="userRole" class="form-input" required>
          <option value="">-- Pilih Role --</option>
          <option value="admin">Admin</option>
          <option value="staff_gudang">Staff Gudang</option>
          <option value="checker_opname">Checker</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password <span id="passwordHint">(kosongkan jika tidak diubah)</span></label>
        <input type="password" id="userPassword" class="form-input">
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="userActive" checked>
          <span>User Aktif</span>
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--secondary" onclick="closeUserModal()">Batal</button>
        <button type="submit" class="btn btn--primary">Simpan</button>
      </div>
    </form>
  </div>
</div>

<style>
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  
  .checkbox-label input {
    width: 18px;
    height: 18px;
  }
  
  #passwordHint {
    font-size: 11px;
    color: #94A3B8;
    font-weight: normal;
  }
</style>

<script>
// User Management - Using window namespace to avoid closure issues
(function() {
  // State stored in window to be accessible by all functions
  window.UserState = window.UserState || {
    userList: [],
    editingUserId: null
  };

  // Load users from server
  async function loadUsers() {
    try {
      const role = document.getElementById('filterRole')?.value || '';
      const isActive = document.getElementById('filterStatus')?.value || '';
      
      let url = '/api/v1/users?';
      if (role) url += `role=${role}&`;
      if (isActive) url += `is_active=${isActive}`;
      
      const response = await fetch(url);
      if (!response.ok) throw new Error('Failed to load');
      const payload = await response.json();
      
      window.UserState.userList = payload.items || payload.data || [];
      renderUsersTable();
    } catch (error) {
      console.error('Error loading users:', error);
      const tbody = document.getElementById('usersTableBody');
      if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Gagal memuat data</td></tr>';
    }
  }

  // Render table
  function renderUsersTable() {
    const tbody = document.getElementById('usersTableBody');
    if (!tbody) return;
    
    const users = window.UserState.userList;
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Tidak ada user</td></tr>';
      return;
    }
    
    tbody.innerHTML = users.map(user => {
      const roleClass = user.role === 'admin' ? 'role-admin' : user.role === 'staff_gudang' ? 'role-staff_gudang' : 'role-checker_opname';
      const isActive = user.status === 'active' || user.is_active;
      
      return `
        <tr>
          <td>${user.nama || user.name || '-'}</td>
          <td><code>${user.username}</code></td>
          <td>${user.email || '-'}</td>
          <td><span class="role-badge ${roleClass}">${formatRole(user.role)}</span></td>
          <td><span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? 'Aktif' : 'Nonaktif'}</span></td>
          <td>
            <button class="action-btn" onclick="UserMgmt.showEdit('${user.id}')">
              <i data-lucide="edit-2"></i>
            </button>
            <button class="action-btn" onclick="UserMgmt.toggleStatus('${user.id}', ${!isActive})" title="${isActive ? 'Nonaktifkan' : 'Aktifkan'}">
              <i data-lucide="${isActive ? 'user-minus' : 'user-plus'}"></i>
            </button>
            <button class="action-btn" onclick="UserMgmt.resetPassword('${user.id}')" title="Reset Password">
              <i data-lucide="key"></i>
            </button>
            <button class="action-btn danger" onclick="UserMgmt.deleteUser('${user.id}')">
              <i data-lucide="trash-2"></i>
            </button>
          </td>
        </tr>
      `;
    }).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }
	
  // Format role label
  function formatRole(role) {
    const roles = {
      'admin': 'Admin',
      'staff_gudang': 'Staff Gudang',
      'checker_opname': 'Checker'
    };
    return roles[role] || role || '-';
  }

  // User Management API object
  window.UserMgmt = {
    showAdd: function() {
      window.UserState.editingUserId = null;
      
      document.getElementById('userModalTitle').textContent = 'Tambah User';
      document.getElementById('userUsername').value = '';
      document.getElementById('userUsername').disabled = false;
      document.getElementById('userEmail').value = '';
      document.getElementById('userNama').value = '';
      document.getElementById('userRole').value = 'admin'; // Default to admin
      document.getElementById('userPassword').value = '';
      document.getElementById('userActive').checked = true;
      document.getElementById('passwordHint').style.display = 'none';
      
      document.getElementById('userModal').classList.add('active');
    },

    showEdit: async function(id) {
      try {
        const response = await fetch(`/api/v1/users/${id}`);
        if (!response.ok) throw new Error('User tidak ditemukan');
        const result = await response.json();
        const user = result.data;
        
        window.UserState.editingUserId = id;
        
        document.getElementById('userModalTitle').textContent = 'Edit User';
        document.getElementById('userUsername').value = user.username || '';
        document.getElementById('userUsername').disabled = true;
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userNama').value = user.name || user.nama_lengkap || '';
        document.getElementById('userRole').value = user.role || 'admin';
        document.getElementById('userPassword').value = '';
        document.getElementById('userActive').checked = user.is_active === true || user.status === 'active';
        document.getElementById('passwordHint').style.display = 'inline';
        
        document.getElementById('userModal').classList.add('active');
      } catch (error) {
        console.error('Error loading user:', error);
        showToast('Gagal memuat data user', false);
      }
    },

    closeModal: function() {
      document.getElementById('userModal').classList.remove('active');
      window.UserState.editingUserId = null;
    },

    saveUser: async function(event) {
      event.preventDefault();
      
      const roleValue = document.getElementById('userRole').value;
      if (!roleValue) {
        showToast('Role harus dipilih!', false);
        return;
      }
      
      const password = document.getElementById('userPassword').value;
      const data = {
        username: document.getElementById('userUsername').value,
        email: document.getElementById('userEmail').value,
        nama: document.getElementById('userNama').value,
        role: roleValue,
        status: document.getElementById('userActive').checked ? 'active' : 'inactive'
      };
      
      if (password) {
        data.password = password;
      }

      try {
        const isEdit = window.UserState.editingUserId !== null;
        const url = isEdit ? `/api/v1/users/${window.UserState.editingUserId}` : '/api/v1/users';
        const method = isEdit ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || 'Gagal menyimpan');
        }
        
        showToast(isEdit ? 'User berhasil diupdate' : 'User berhasil ditambahkan');
        window.UserMgmt.closeModal();
        loadUsers();
      } catch (error) {
        console.error('Error saving user:', error);
        showToast(error.message || 'Gagal menyimpan user', false);
      }
    },

    deleteUser: async function(id) {
      if (!confirm('Yakin hapus user ini?')) return;
      
      try {
        const response = await fetch(`/api/v1/users/${id}`, { method: 'DELETE' });
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || 'Gagal menghapus');
        }
        
        showToast('User berhasil dihapus');
        loadUsers();
      } catch (error) {
        console.error('Error deleting user:', error);
        showToast(error.message || 'Gagal menghapus user', false);
      }
    },

    toggleStatus: async function(id, enable) {
      try {
        const url = enable ? `/api/v1/users/${id}/enable` : `/api/v1/users/${id}/disable`;
        const response = await fetch(url, { method: 'POST' });
        
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || 'Gagal update status');
        }
        
        showToast(enable ? 'User berhasil diaktifkan' : 'User berhasil dinonaktifkan');
        loadUsers();
      } catch (error) {
        console.error('Error toggling user status:', error);
        showToast(error.message || 'Gagal update status', false);
      }
    },

    resetPassword: async function(id) {
      if (!confirm('Reset password user ini?')) return;
      
      try {
        const response = await fetch(`/api/v1/users/${id}/reset-password`, { method: 'POST' });
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || 'Gagal reset password');
        }
        
        showToast('Password berhasil direset');
        loadUsers();
      } catch (error) {
        console.error('Error resetting password:', error);
        showToast(error.message || 'Gagal reset password', false);
      }
    }
  };

  // Alias untuk backward compatibility
  window.showAddUserModal = window.UserMgmt.showAdd;
  window.editUser = window.UserMgmt.showEdit;
  window.closeUserModal = window.UserMgmt.closeModal;
  window.saveUser = window.UserMgmt.saveUser;
  window.deleteUser = window.UserMgmt.deleteUser;
  window.toggleUserStatus = window.UserMgmt.toggleStatus;
  window.resetUserPassword = window.UserMgmt.resetPassword;

  // Filter handlers
  document.getElementById('filterRole')?.addEventListener('change', loadUsers);
  document.getElementById('filterStatus')?.addEventListener('change', loadUsers);

  // Init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadUsers);
  } else {
    loadUsers();
  }
})();
