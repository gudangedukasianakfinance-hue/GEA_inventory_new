<!-- Riwayat SO Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Riwayat Stok Opname</h2>
    <p class="page-subtitle">Lihat histori hasil stok opname gudang</p>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Bulan</label>
      <select id="filterBulan">
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6" selected>Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Tahun</label>
      <select id="filterTahun">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
    </div>
    <button class="btn btn--secondary btn--sm" onclick="loadHistory()">
      <i data-lucide="search"></i>
      <span>Cari</span>
    </button>
  </div>

  <!-- History Table -->
  <div class="card">
    <div class="card__header">
      <h3>Daftar Hasil SO</h3>
      <span id="historyCount" class="badge badge--info">0 hasil</span>
    </div>
    <table class="data-table" id="historyTable">
      <thead>
        <tr>
          <th>Kode SO</th>
          <th>Tanggal</th>
          <th>SVP</th>
          <th>Lokasi</th>
          <th>Item</th>
          <th>Selisih</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="historyTableBody">
        <tr>
          <td colspan="8" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Detail SO Modal -->
<div id="detailSoModal" class="modal-overlay" style="display:none;">
  <div class="modal modal--lg">
    <div class="modal__header">
      <h3 class="modal__title" id="detailSoTitle">Detail Hasil SO</h3>
      <button class="modal__close" onclick="closeDetailSo()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal__body" id="detailSoBody">
      <!-- Detail content will be loaded here -->
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" onclick="closeDetailSo()">Tutup</button>
      <button class="btn btn--primary" onclick="downloadDetailCsv()">
        <i data-lucide="download"></i>
        <span>Download CSV</span>
      </button>
    </div>
  </div>
</div>

<script>
  // Namespace untuk state (hindari redeclare saat SPA cache reload)
  window.SORiwayat = window.SORiwayat || {};
  window.SORiwayat.historyData = window.SORiwayat.historyData || [];
  window.SORiwayat.currentDetailData = window.SORiwayat.currentDetailData || null;

  function getStatusClass(status) {
    const statusMap = {
      'menunggu': 'badge--pending',
      'proses': 'badge--process',
      'selesai': 'badge--done',
      'ditolak': 'badge--danger'
    };
    return statusMap[status] || 'badge--pending';
  }

  function getStatusLabel(status) {
    const labelMap = {
      'menunggu': 'Menunggu',
      'proses': 'Proses',
      'selesai': 'Selesai',
      'ditolak': 'Ditolak'
    };
    return labelMap[status] || status;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function formatNumber(num) {
    return num ? num.toLocaleString('id-ID') : '0';
  }

  async function loadHistory() {
    const bulan = document.getElementById('filterBulan').value;
    const tahun = document.getElementById('filterTahun').value;
    
    try {
      document.getElementById('historyTableBody').innerHTML = 
        '<tr><td colspan="8" class="text-center text-muted"><i data-lucide="loader-2" class="spin"></i> Memuat...</td></tr>';
      if (window.lucide) lucide.createIcons();
      
      // Cache busting with timestamp
      const timestamp = Date.now();
      const response = await fetch(`/api/opname-history?bulan=${bulan}&tahun=${tahun}&_=${timestamp}`);
      if (!response.ok) throw new Error('Failed to load');
      
      const json = await response.json();
      // Ensure data is always array
      window.SORiwayat.historyData = Array.isArray(json) ? json : (json.items || []);
      
      document.getElementById('historyCount').textContent = `${window.SORiwayat.historyData.length} hasil`;
      renderHistoryTable(window.SORiwayat.historyData);
    } catch (error) {
      console.error('Error loading history:', error);
      document.getElementById('historyTableBody').innerHTML = 
        '<tr><td colspan="8" class="text-center text-danger">Gagal memuat data</td></tr>';
    }
  }

  function renderHistoryTable(items) {
    const tbody = document.getElementById('historyTableBody');
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Tidak ada riwayat SO periode ini</td></tr>';
      return;
    }
    
    tbody.innerHTML = items.map(item => {
      const selisih = item.total_selisih_net || (item.total_selisih || 0);
      const selisihClass = selisih > 0 ? 'text-success' : selisih < 0 ? 'text-danger' : '';
      const selisihPrefix = selisih > 0 ? '+' : '';
      
      return `
        <tr>
          <td><code>${item.kode_so || '-'}</code></td>
          <td>${formatDate(item.tanggal_pelaksanaan || item.tanggal_perintah || item.created_at)}</td>
          <td>${item.svp_nama || item.svp || '-'}</td>
          <td>${item.lokasi || '-'}</td>
          <td>${formatNumber(item.total_item)}</td>
          <td class="${selisihClass}">${selisihPrefix}${formatNumber(selisih)}</td>
          <td><span class="badge ${getStatusClass(item.status)}">${getStatusLabel(item.status)}</span></td>
          <td>
            <button class="action-btn" onclick="viewDetail(${item.opname_id || item.id})" title="Lihat Detail">
              <i data-lucide="eye"></i>
            </button>
            <button class="action-btn" onclick="downloadCsv(${item.opname_id || item.id})" title="Download CSV">
              <i data-lucide="download"></i>
            </button>
          </td>
        </tr>
      `;
    }).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  async function viewDetail(opnameId) {
    if (!opnameId) {
      showToast('ID opname tidak ditemukan', false);
      return;
    }
    
    try {
      showLoader();
      // Try opname_id first, fallback to id
      const response = await fetch(`/api/opname-history?opname_id=${opnameId}&detail=true`);
      if (!response.ok) throw new Error('Failed to load detail');
      
      const data = await response.json();
      window.SORiwayat.currentDetailData = data;
      renderDetailModal(data);
      document.getElementById('detailSoModal').style.display = 'flex';
    } catch (error) {
      console.error('Error loading detail:', error);
      showToast('Gagal memuat detail SO', false);
    } finally {
      hideLoader();
    }
  }

  function renderDetailModal(data) {
    if (!data) {
      document.getElementById('detailSoBody').innerHTML = '<p class="text-danger">Data tidak tersedia</p>';
      return;
    }
    
    const { header, details = [] } = data;
    
    // If data is flat array (not proper format), use first item as header
    const headerData = header || (Array.isArray(data) && data[0]) || {};
    const detailsData = details || (Array.isArray(data) ? data.slice(1) : []);
    
    const kodeSo = headerData?.kode_so || headerData?.id || 'N/A';
    document.getElementById('detailSoTitle').textContent = `Detail SO - ${kodeSo}`;
    
    const selisih = Number(headerData?.total_selisih_net || headerData?.total_selisih || 0);
    const selisihClass = selisih > 0 ? 'text-success' : selisih < 0 ? 'text-danger' : '';
    
    const html = `
      <div class="detail-header">
        <div class="detail-info-grid">
          <div class="detail-info-item">
            <span class="detail-info-label">Kode SO</span>
            <span class="detail-info-value">${headerData.kode_so || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Tanggal Perintah</span>
            <span class="detail-info-value">${formatDate(headerData.tanggal_perintah || headerData.tanggal)}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Tanggal Pelaksanaan</span>
            <span class="detail-info-value">${formatDate(headerData.tanggal_pelaksanaan || headerData.created_at)}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Supervisor</span>
            <span class="detail-info-value">${headerData.svp_nama || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">PIC / Checker</span>
            <span class="detail-info-value">${headerData.pic_pelaksana || headerData.checker || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Lokasi</span>
            <span class="detail-info-value">${headerData.lokasi || '-'}</span>
          </div>
        </div>
        <div class="detail-summary">
          <div class="detail-summary-item">
            <span class="detail-summary-value">${detailsData.length || headerData.total_item || 0}</span>
            <span class="detail-summary-label">Total Item</span>
          </div>
          <div class="detail-summary-item">
            <span class="detail-summary-value text-danger">${headerData.total_item_selisih || 0}</span>
            <span class="detail-summary-label">Item Bermasalah</span>
          </div>
          <div class="detail-summary-item">
            <span class="detail-summary-value ${selisihClass}">${selisih > 0 ? '+' : ''}${selisih}</span>
            <span class="detail-summary-label">Selisih Net</span>
          </div>
          <div class="detail-summary-item">
            <span class="badge ${headerData.stok_disesuaikan ? 'badge--done' : 'badge--pending'}">
              ${headerData.stok_disesuaikan ? 'Sudah Disesuaikan' : 'Belum Disesuaikan'}
            </span>
            <span class="detail-summary-label">Status Stok</span>
          </div>
        </div>
      </div>
      <div class="detail-table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Produk</th>
              <th>Stok Sistem</th>
              <th>Stok Fisik</th>
              <th>Selisih</th>
            </tr>
          </thead>
          <tbody>
            ${detailsData.length === 0 ? 
              '<tr><td colspan="5" class="text-center text-muted">Tidak ada detail</td></tr>' :
              detailsData.map(d => {
                const dSelisih = Number(d.selisih || 0);
                const dClass = dSelisih > 0 ? 'text-success' : dSelisih < 0 ? 'text-danger' : '';
                const dPrefix = dSelisih > 0 ? '+' : '';
                return `
                  <tr>
                    <td><code>${d.sku}</code></td>
                    <td>${d.nama_produk || '-'}</td>
                    <td>${formatNumber(d.stok_sistem)}</td>
                    <td>${formatNumber(d.stok_fisik)}</td>
                    <td class="${dClass}">${dPrefix}${formatNumber(dSelisih)}</td>
                  </tr>
                `;
              }).join('')
            }
          </tbody>
        </table>
      </div>
    `;
    
    document.getElementById('detailSoBody').innerHTML = html;
    if (window.lucide) lucide.createIcons();
  }

  function closeDetailSo() {
    document.getElementById('detailSoModal').style.display = 'none';
    window.SORiwayat.currentDetailData = null;
  }

  function downloadDetailCsv() {
    const data = window.SORiwayat.currentDetailData;
    if (!data || !data.details || data.details.length === 0) {
      showToast('Tidak ada data untuk diunduh', false);
      return;
    }
    
    const header = data.header || {};
    const details = data.details || [];
    const kodeSo = header.kode_so || 'SO';
    
    const csvContent = [
      ['Kode SO', 'SKU', 'Produk', 'Stok Sistem', 'Stok Fisik', 'Selisih'],
      ...details.map(d => [
        kodeSo,
        d.sku || '',
        (d.nama_produk || '').replace(/,/g, ';'),
        d.stok_sistem || 0,
        d.stok_fisik || 0,
        d.selisih || 0
      ])
    ].map(row => row.join(',')).join('\n');
    
    downloadBlob(csvContent, `${kodeSo}_detail.csv`, 'text/csv');
    showToast('CSV berhasil diunduh');
  }

  async function downloadCsv(opnameId) {
    if (!opnameId) return;
    
    try {
      showLoader();
      
      // Get detail data from API
      const response = await fetch(`/api/opname-history?opname_id=${opnameId}&detail=true`);
      if (!response.ok) throw new Error('Failed to load data');
      
      const data = await response.json();
      const { header, details = [] } = data || {};
      
      // Generate CSV content
      const headerData = header || {};
      const detailsData = details || [];
      
      const csvContent = [
        ['Kode SO', headerData.kode_so || ''],
        ['Tanggal', formatDate(headerData.tanggal_perintah || headerData.tanggal)],
        ['PIC Checker', headerData.pic_pelaksana || headerData.checker || ''],
        ['Lokasi', headerData.lokasi || ''],
        [''],
        ['SKU', 'Nama Produk', 'Stok Sistem', 'Stok Fisik', 'Selisih'],
        ...detailsData.map(d => [
          d.sku || '',
          d.nama_produk || '',
          d.stok_sistem || 0,
          d.stok_fisik || 0,
          d.selisih || 0
        ])
      ].map(row => row.join(',')).join('\n');
      
      downloadBlob(csvContent, `${headerData.kode_so || 'SO'}_${opnameId}.csv`, 'text/csv');
      showToast('CSV berhasil diunduh');
    } catch (error) {
      console.error('Error downloading CSV:', error);
      showToast('Gagal mengunduh CSV', false);
    } finally {
      hideLoader();
    }
  }

  function downloadBlob(content, filename, mimeType) {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
  }

  // Filters - single load trigger
  let filterInitialized = false;
  
  function initFilters() {
    if (filterInitialized) return;
    filterInitialized = true;
    
    const now = new Date();
    const bulanEl = document.getElementById('filterBulan');
    const tahunEl = document.getElementById('filterTahun');
    
    if (bulanEl) bulanEl.value = now.getMonth() + 1;
    if (tahunEl) tahunEl.value = now.getFullYear();
    
    // Only load if called directly, not during page load
    if (document.readyState === 'complete') {
      loadHistory();
    }
  }
  
  document.getElementById('filterBulan')?.addEventListener('change', () => {
    initFilters();
    loadHistory();
  });
  document.getElementById('filterTahun')?.addEventListener('change', () => {
    initFilters();
    loadHistory();
  });

  // Load on page ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initFilters);
  } else {
    initFilters();
  }
</script>

<style>

    display: flex;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filter-group label {
    font-size: 12px;
    color: #94A3B8;
  }
  .filter-group select {
    min-width: 140px;
  }
  .badge--info {
    background: rgba(59, 130, 246, 0.2);
    color: #3B82F6;
  }
  .badge--danger {
    background: rgba(239, 68, 68, 0.2);
    color: #EF4444;
  }
  .modal--lg {
    max-width: 900px;
  }
  .detail-header {
    margin-bottom: 24px;
  }
  .detail-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  .detail-info-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .detail-info-label {
    font-size: 11px;
    color: #94A3B8;
    text-transform: uppercase;
  }
  .detail-info-value {
    font-size: 14px;
    color: #FFF;
    font-weight: 500;
  }
  .detail-summary {
    display: flex;
    gap: 24px;
    padding: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
  }
  .detail-summary-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .detail-summary-value {
    font-size: 24px;
    font-weight: 700;
    color: #FFF;
  }
  .detail-summary-label {
    font-size: 11px;
    color: #94A3B8;
  }
  .detail-table-container {
    max-height: 400px;
    overflow-y: auto;
  }
  .spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .card__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
