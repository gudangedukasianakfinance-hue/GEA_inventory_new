<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distribusi Outlet</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .coming-soon-page { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .card { background: #fff; padding: 48px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card h2 { margin: 0 0 16px 0; color: #1f2937; }
    .card p { margin: 0 0 24px 0; color: #6b7280; }
    .badge-warning { background: #fef3c7; color: #92400e; padding: 8px 16px; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <section class="coming-soon-page">
      <div class="card">
        <h2>Coming Soon</h2>
        <p>Fitur akan tersedia pada sprint berikutnya.</p>
        <span class="badge badge-warning">SOON</span>
      </div>
    </section>
  </div>
</body>
</html>
