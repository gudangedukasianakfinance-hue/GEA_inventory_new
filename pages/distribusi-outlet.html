<!-- Distribusi Outlet Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Distribusi Outlet</h2>
    <p class="page-subtitle">Kelola distribusi barang ke outlet</p>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" style="background: rgba(168, 85, 247, 0.12); color: #A855F7;">
        <i data-lucide="send"></i>
      </div>
      <div class="kpi-label">Hari Ini</div>
      <div class="kpi-value" id="distribusiHariIni">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" style="background: rgba(59, 130, 246, 0.12); color: #3B82F6;">
        <i data-lucide="calendar"></i>
      </div>
      <div class="kpi-label">Bulan Ini</div>
      <div class="kpi-value" id="distribusiBulanIni">-</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="page-actions">
    <button class="btn btn--primary" onclick="showTambahDistribusi()">
      <i data-lucide="plus"></i>
      <span>Buat Distribusi</span>
    </button>
  </div>

  <!-- Distribution Table -->
  <div class="card">
    <table class="data-table" id="distribusiTable">
      <thead>
        <tr>
          <th>No. SO</th>
          <th>Tanggal</th>
          <th>Outlet</th>
          <th>Total Item</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="distribusiTableBody">
        <tr>
          <td colspan="6" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<script>
  async function loadDistribusiOutlet() {
    try {
      const response = await fetch('/api/v1/distribusi');
      if (!response.ok) throw new Error('Failed to load');
      const data = await response.json();
      
      document.getElementById('distribusiHariIni').textContent = data.hari_ini || 0;
      document.getElementById('distribusiBulanIni').textContent = data.bulan_ini || 0;
      
      renderDistribusiTable(data.items || []);
    } catch (error) {
      console.error('Error loading distribusi:', error);
    }
  }

  function renderDistribusiTable(items) {
    const tbody = document.getElementById('distribusiTableBody');
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Tidak ada data</td></tr>';
      return;
    }
    
    tbody.innerHTML = items.map(item => `
      <tr>
        <td><code>${item.no_so}</code></td>
        <td>${item.tanggal}</td>
        <td>${item.outlet}</td>
        <td>${item.total_item}</td>
        <td><span class="badge badge--${item.status}">${item.status}</span></td>
        <td>
          <button class="action-btn" onclick="viewDistribusi('${item.id}')">
            <i data-lucide="eye"></i>
          </button>
        </td>
      </tr>
    `).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  function showTambahDistribusi() {
    console.log('Tambah distribusi');
  }

  function viewDistribusi(id) {
    console.log('View:', id);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadDistribusiOutlet);
  } else {
    loadDistribusiOutlet();
  }
</script>
