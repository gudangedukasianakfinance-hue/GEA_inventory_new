<!-- Task Saya Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Task Saya</h2>
    <p class="page-subtitle">Daftar tugas Stok Opname yang harus dikerjakan</p>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-action-btn" onclick="AppRouter.navigateTo('dashboard-so')">
      <i data-lucide="bar-chart-2"></i>
      <span>Dashboard SO</span>
    </button>
    <button class="quick-action-btn" onclick="AppRouter.navigateTo('riwayat-so')">
      <i data-lucide="history"></i>
      <span>Riwayat SO</span>
    </button>
  </div>

  <!-- Task Stats -->
  <div class="stats-grid" id="taskStats">
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--pending">
        <i data-lucide="clock"></i>
      </div>
      <div class="stat-card__content">
        <span class="stat-card__value" id="statMenunggu">0</span>
        <span class="stat-card__label">Menunggu</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--process">
        <i data-lucide="loader"></i>
      </div>
      <div class="stat-card__content">
        <span class="stat-card__value" id="statProses">0</span>
        <span class="stat-card__label">Sedang Proses</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--done">
        <i data-lucide="check-circle"></i>
      </div>
      <div class="stat-card__content">
        <span class="stat-card__value" id="statSelesai">0</span>
        <span class="stat-card__label">Selesai</span>
      </div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Status</label>
      <select id="filterStatus">
        <option value="">Semua</option>
        <option value="menunggu">Menunggu</option>
        <option value="proses">Sedang Proses</option>
        <option value="selesai">Selesai</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Bulan</label>
      <select id="filterBulan">
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6" selected>Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Tahun</label>
      <select id="filterTahun">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
    </div>
    <button class="btn btn--secondary btn--sm" onclick="loadTaskList()">
      <i data-lucide="search"></i>
      <span>Filter</span>
    </button>
  </div>

  <!-- Task List -->
  <div class="card">
    <div class="card__header">
      <h3>Daftar Task</h3>
      <span id="taskCount" class="badge badge--info">0 task</span>
    </div>
    <table class="data-table" id="taskTable">
      <thead>
        <tr>
          <th>Kode SO</th>
          <th>Tanggal</th>
          <th>SVP</th>
          <th>Progress</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="taskTableBody">
        <tr>
          <td colspan="6" class="text-center text-muted">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Task Detail Modal -->
<div id="taskDetailModal" class="modal-overlay">
  <div class="modal modal--lg">
    <div class="modal__header">
      <h3 class="modal__title">Detail Task</h3>
      <button class="modal__close" onclick="closeTaskDetail()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal__body" id="taskDetailBody">
      <!-- Detail content will be loaded here -->
    </div>
    <div class="modal__footer">
      <button type="button" class="btn btn--secondary" onclick="closeTaskDetail()">Tutup</button>
      <button type="button" id="taskActionBtn" class="btn btn--primary" onclick="">
        <i data-lucide="play"></i>
        <span>Mulai SO</span>
      </button>
    </div>
  </div>
</div>

<script>
  // Namespace untuk state
  window.TaskSaya = window.TaskSaya || {};
  window.TaskSaya.taskList = window.TaskSaya.taskList || [];
  window.TaskSaya.currentTask = null;

  function getStatusClass(status) {
    const statusMap = {
      'menunggu': 'badge--pending',
      'proses': 'badge--process',
      'selesai': 'badge--done'
    };
    return statusMap[status] || 'badge--pending';
  }

  function getStatusLabel(status) {
    const labelMap = {
      'menunggu': 'Menunggu',
      'proses': 'Proses',
      'selesai': 'Selesai'
    };
    return labelMap[status] || status;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function formatBulan(bulan) {
    const namaBulan = ['', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    return namaBulan[bulan] || '-';
  }

  async function loadTaskList() {
    const bulan = document.getElementById('filterBulan').value;
    const tahun = document.getElementById('filterTahun').value;
    const statusFilter = document.getElementById('filterStatus').value;
    
    try {
      document.getElementById('taskTableBody').innerHTML = 
        '<tr><td colspan="6" class="text-center text-muted"><i data-lucide="loader-2" class="spin"></i> Memuat...</td></tr>';
      if (window.lucide) lucide.createIcons();
      
      // Load dari API yang sama dengan perintah SO
      const response = await fetch(`/api/opname-perintah?bulan=${bulan}&tahun=${tahun}`);
      if (!response.ok) throw new Error('Failed to load tasks');
      
      const data = await response.json();
      let items = data.items || data || [];
      
      // Filter by status if specified
      if (statusFilter) {
        items = items.filter(item => item.status === statusFilter);
      }
      
      // Sort: menunggu first, then proses, then selesai
      items.sort((a, b) => {
        const order = { 'menunggu': 0, 'proses': 1, 'selesai': 2 };
        return (order[a.status] || 3) - (order[b.status] || 3);
      });
      
      window.TaskSaya.taskList = items;
      
      // Update stats
      const stats = {
        menunggu: (data.items || []).filter(i => i.status === 'menunggu').length,
        proses: (data.items || []).filter(i => i.status === 'proses').length,
        selesai: (data.items || []).filter(i => i.status === 'selesai').length
      };
      document.getElementById('statMenunggu').textContent = stats.menunggu;
      document.getElementById('statProses').textContent = stats.proses;
      document.getElementById('statSelesai').textContent = stats.selesai;
      
      document.getElementById('taskCount').textContent = `${items.length} task`;
      renderTaskTable(items);
    } catch (error) {
      console.error('Error loading tasks:', error);
      document.getElementById('taskTableBody').innerHTML = 
        '<tr><td colspan="6" class="text-center text-danger">Gagal memuat data</td></tr>';
    }
  }

  function renderTaskTable(items) {
    const tbody = document.getElementById('taskTableBody');
    
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Tidak ada task untuk periode ini</td></tr>';
      return;
    }
    
    tbody.innerHTML = items.map(item => {
      const progress = item.progress_percent || 0;
      const targetSku = item.target_sku || 0;
      const checkedSku = item.checked_sku || 0;
      
      return `
        <tr>
          <td><code>${item.kode_so || '-'}</code></td>
          <td>${formatDate(item.tanggal_perintah)}</td>
          <td>${item.svp_nama || '-'}</td>
          <td>
            <div class="progress-mini">
              <div class="progress-bar-mini">
                <div class="progress-bar-mini__fill" style="width: ${Math.min(progress, 100)}%"></div>
              </div>
              <span class="progress-label">${checkedSku}/${targetSku} SKU</span>
            </div>
          </td>
          <td><span class="badge ${getStatusClass(item.status)}">${getStatusLabel(item.status)}</span></td>
          <td>
            <button class="action-btn" onclick="viewTaskDetail(${item.id})" title="Lihat Detail">
              <i data-lucide="eye"></i>
            </button>
          </td>
        </tr>
      `;
    }).join('');
    
    if (window.lucide) lucide.createIcons({ nodes: [tbody] });
  }

  async function viewTaskDetail(taskId) {
    try {
      showLoader();
      
      const response = await fetch(`/api/opname-perintah?id=${taskId}`);
      if (!response.ok) throw new Error('Failed to load task detail');
      
      const item = await response.json();
      window.TaskSaya.currentTask = item;
      
      renderTaskDetailModal(item);
      document.getElementById('taskDetailModal').classList.add('active');
      
    } catch (error) {
      console.error('Error loading task detail:', error);
      showToast('Gagal memuat detail task', false);
    } finally {
      hideLoader();
    }
  }

  function renderTaskDetailModal(item) {
    const progress = item.progress_percent || 0;
    const targetSku = item.target_sku || 0;
    const checkedSku = item.checked_sku || 0;
    
    const html = `
      <div class="detail-header">
        <div class="detail-info-grid">
          <div class="detail-info-item">
            <span class="detail-info-label">Kode SO</span>
            <span class="detail-info-value">${item.kode_so || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Tanggal Perintah</span>
            <span class="detail-info-value">${formatDate(item.tanggal_perintah)}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Periode</span>
            <span class="detail-info-value">${formatBulan(item.bulan)} ${item.tahun}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Supervisor</span>
            <span class="detail-info-value">${item.svp_nama || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">PIC Checker</span>
            <span class="detail-info-value">${item.pic_checker || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Lokasi</span>
            <span class="detail-info-value">${item.lokasi || 'Gudang Utama'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Kategori</span>
            <span class="detail-info-value">${item.kategori_nama || '-'}</span>
          </div>
          <div class="detail-info-item">
            <span class="detail-info-label">Status</span>
            <span class="badge ${getStatusClass(item.status)}">${getStatusLabel(item.status)}</span>
          </div>
        </div>
        
        <div class="detail-progress">
          <div class="progress-header">
            <span>Progress</span>
            <span>${checkedSku} / ${targetSku} SKU (${progress.toFixed(1)}%)</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar__fill" style="width: ${Math.min(progress, 100)}%"></div>
          </div>
        </div>
        
        ${item.keterangan ? `
        <div class="detail-info-item full-width">
          <span class="detail-info-label">Keterangan</span>
          <span class="detail-info-value">${item.keterangan}</span>
        </div>
        ` : ''}
      </div>
    `;
    
    document.getElementById('taskDetailBody').innerHTML = html;
    
    // Configure action button based on status
    const actionBtn = document.getElementById('taskActionBtn');
    if (item.status === 'menunggu') {
      actionBtn.innerHTML = '<i data-lucide="play"></i><span>Claim & Mulai SO</span>';
      actionBtn.onclick = () => claimAndStartTask(item.id);
      actionBtn.style.display = 'inline-flex';
      actionBtn.disabled = false;
    } else if (item.status === 'proses') {
      actionBtn.innerHTML = '<i data-lucide="external-link"></i><span>Lanjutkan SO</span>';
      actionBtn.onclick = () => startPelaksanaanSo(item.id);
      actionBtn.style.display = 'inline-flex';
      actionBtn.disabled = false;
    } else {
      actionBtn.style.display = 'none';
    }
    
    if (window.lucide) lucide.createIcons();
  }

  function closeTaskDetail() {
    document.getElementById('taskDetailModal').classList.remove('active');
    window.TaskSaya.currentTask = null;
  }

  async function claimAndStartTask(taskId) {
    try {
      showLoader();
      
      // Call API to claim/start task
      const response = await fetch('/api/opname-perintah', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'start',
          perintah_id: taskId,
          pic_checker: getCurrentUserName()
        })
      });
      
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Failed to claim task');
      }
      
      showToast('Task berhasil di-claim. Membuka halaman Pelaksanaan SO...');
      
      // Save active perintah to localStorage for pelaksanaan-so page
      const task = window.TaskSaya.currentTask;
      if (task) {
        localStorage.setItem('activePerintahId', task.id);
        localStorage.setItem('activePerintahKode', task.kode_so);
        localStorage.setItem('activeOpnameId', response.ok ? (await response.clone().json()).opname_id : '');
      }
      
      closeTaskDetail();
      
      // Navigate to pelaksanaan-so
      setTimeout(() => {
        AppRouter.navigateTo('pelaksanaan-so');
      }, 500);
      
    } catch (error) {
      console.error('Error claiming task:', error);
      showToast(error.message || 'Gagal claim task', false);
    } finally {
      hideLoader();
    }
  }

  async function startPelaksanaanSo(taskId) {
    const task = window.TaskSaya.currentTask || window.TaskSaya.taskList.find(t => t.id === taskId);
    if (!task) {
      showToast('Data task tidak ditemukan', false);
      return;
    }
    
    // Save active perintah to localStorage
    localStorage.setItem('activePerintahId', task.id);
    localStorage.setItem('activePerintahKode', task.kode_so);
    localStorage.setItem('activeOpnameId', task.opname_id || '');
    
    closeTaskDetail();
    AppRouter.navigateTo('pelaksanaan-so');
  }

  function getCurrentUserName() {
    try {
      const auth = JSON.parse(localStorage.getItem('auth_user') || '{}');
      return auth.username || auth.nama || 'User';
    } catch {
      return 'User';
    }
  }

  // Filters
  document.getElementById('filterStatus')?.addEventListener('change', loadTaskList);
  document.getElementById('filterBulan')?.addEventListener('change', loadTaskList);
  document.getElementById('filterTahun')?.addEventListener('change', loadTaskList);

  // Initialize filters with current month/year
  (function initFilters() {
    const now = new Date();
    document.getElementById('filterBulan').value = now.getMonth() + 1;
    document.getElementById('filterTahun').value = now.getFullYear();
  })();

  // Page init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadTaskList);
  } else {
    loadTaskList();
  }
</script>

<style>

    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  
  .stat-card {
    background: var(--surface-elevated);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .stat-card__icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .stat-card__icon--pending {
    background: rgba(148, 163, 184, 0.2);
    color: #94A3B8;
  }
  
  .stat-card__icon--process {
    background: rgba(255, 77, 58, 0.2);
    color: #FF4D3A;
  }
  
  .stat-card__icon--done {
    background: rgba(34, 197, 94, 0.2);
    color: #22C55E;
  }
  
  .stat-card__content {
    display: flex;
    flex-direction: column;
  }
  
  .stat-card__value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }
  
  .stat-card__label {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  
  .progress-mini {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .badge--info {
    background: rgba(59, 130, 246, 0.2);
    color: #3B82F6;
  }
  
  .modal--lg {
    max-width: 600px;
  }
  
  .detail-header {
    margin-bottom: 0;
  }
  
  .detail-info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  
  .detail-info-item {
    display: flex;

  }
  
  .detail-info-item.full-width {
    grid-column: 1 / -1;
  }
  
  .detail-info-label {
    font-size: 11px;

  }
  
  .detail-info-value {
    font-size: 14px;

  }
  
  .detail-progress {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 16px;

  }
  
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  
  .spin {
    animation: spin 1s linear infinite;
  }
  
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
