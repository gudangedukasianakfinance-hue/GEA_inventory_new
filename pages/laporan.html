<!-- Laporan Page -->
<section class="page-section">
  <div class="page-header">
    <h2 class="page-title">Laporan</h2>
    <p class="page-subtitle">Generate laporan dan analisis data</p>
  </div>

  <!-- Filter Periode -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Bulan</label>
      <select id="filterBulan">
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6" selected>Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Tahun</label>
      <select id="filterTahun">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
    </div>
  </div>

  <!-- Report Cards -->
  <div class="report-grid">
    <div class="report-card" onclick="generateReport('stok')">
      <div class="report-card__icon">
        <i data-lucide="package"></i>
      </div>
      <div class="report-card__content">
        <h3>Laporan Stok</h3>
        <p>Laporan persediaan dan stok gudang</p>
      </div>
      <div class="report-card__action">
        <i data-lucide="chevron-right"></i>
      </div>
    </div>

    <div class="report-card" onclick="generateReport('penjualan')">
      <div class="report-card__icon">
        <i data-lucide="shopping-cart"></i>
      </div>
      <div class="report-card__content">
        <h3>Laporan Penjualan</h3>
        <p>Laporan transaksi penjualan</p>
      </div>
      <div class="report-card__action">
        <i data-lucide="chevron-right"></i>
      </div>
    </div>

    <div class="report-card" onclick="generateReport('opname')">
      <div class="report-card__icon">
        <i data-lucide="clipboard-check"></i>
      </div>
      <div class="report-card__content">
        <h3>Laporan Opname</h3>
        <p>Laporan stok opname dan selisih</p>
      </div>
      <div class="report-card__action">
        <i data-lucide="chevron-right"></i>
      </div>
    </div>

    <div class="report-card" onclick="generateReport('export')">
      <div class="report-card__icon">
        <i data-lucide="download"></i>
      </div>
      <div class="report-card__content">
        <h3>Export Data</h3>
        <p>Export data ke CSV/Excel</p>
      </div>
      <div class="report-card__action">
        <i data-lucide="chevron-right"></i>
      </div>
    </div>
  </div>

  <!-- Report Preview -->
  <div class="card report-preview" id="reportPreview" style="display:none;">
    <div class="card__header">
      <h3 id="reportTitle">Preview Laporan</h3>
      <div class="report-actions">
        <button class="btn btn--secondary" onclick="downloadReport('csv')">
          <i data-lucide="file-spreadsheet"></i>
          <span>CSV</span>
        </button>
        <button class="btn btn--secondary" onclick="downloadReport('xlsx')">
          <i data-lucide="file-spreadsheet"></i>
          <span>Excel</span>
        </button>
        <button class="btn btn--secondary" onclick="printReport()">
          <i data-lucide="printer"></i>
          <span>Print</span>
        </button>
      </div>
    </div>
    <div id="reportContent">
      <!-- Report content will be loaded here -->
    </div>
  </div>
</section>

<style>
  .report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  
  .report-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: #101827;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .report-card:hover {
    border-color: #FF4D3A;
    transform: translateY(-2px);
  }
  
  .report-card__icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(255, 77, 58, 0.12);
    color: #FF4D3A;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .report-card__content {
    flex: 1;
  }
  
  .report-card__content h3 {
    font-size: 16px;
    color: #FFF;
    margin-bottom: 4px;
  }
  
  .report-card__content p {
    font-size: 13px;
    color: #94A3B8;
  }
  
  .report-card__action {
    color: #94A3B8;
  }
  
  .report-actions {
    display: flex;
    gap: 8px;
  }
  
  .report-preview .card__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .loading-state {
    text-align: center;
    padding: 48px;
    color: #94A3B8;
  }
  
  .loading-state i {
    width: 32px;
    height: 32px;
    margin-bottom: 12px;
    animation: spin 1s linear infinite;
  }
  
  .error-state {
    text-align: center;
    padding: 48px;
    color: #EF4444;
  }
  
  .report-summary {
    margin-top: 16px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font-size: 13px;
    color: #94A3B8;
  }
  
  .report-notice {
    padding: 16px;
    margin-bottom: 16px;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 8px;
    color: #60A5FA;
    font-size: 13px;
  }
  
  .text-success {
    color: #22C55E !important;
  }
  
  .text-danger {
    color: #EF4444 !important;
  }
  
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>

<script>
  // Namespace untuk state (hindari redeclare saat SPA cache reload)
  window.Laporan = window.Laporan || {};
  window.Laporan.currentReportType = window.Laporan.currentReportType || null;
  window.Laporan.reportData = window.Laporan.reportData || null;

  function generateReport(type) {
    window.Laporan.currentReportType = type;
    window.Laporan.reportData = null;
    
    const bulan = document.getElementById('filterBulan').value;
    const tahun = document.getElementById('filterTahun').value;
    
    const titles = {
      'stok': `Laporan Stok Gudang - ${getNamaBulan(bulan)} ${tahun}`,
      'penjualan': `Laporan Penjualan - ${getNamaBulan(bulan)} ${tahun}`,
      'opname': `Laporan Stok Opname - ${getNamaBulan(bulan)} ${tahun}`,
      'export': `Export Data - ${getNamaBulan(bulan)} ${tahun}`
    };
    
    document.getElementById('reportTitle').textContent = titles[type];
    document.getElementById('reportPreview').style.display = 'block';
    
    // Store filter values
    window.Laporan.filterBulan = bulan;
    window.Laporan.filterTahun = tahun;
    
    loadReportContent(type);
  }
  
  function getNamaBulan(bulan) {
    const nama = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                  'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    return nama[bulan - 1] || bulan;
  }

  async function loadReportContent(type) {
    const container = document.getElementById('reportContent');
    container.innerHTML = '<div class="loading-state"><i data-lucide="loader-2" class="spin"></i> Memuat laporan...</div>';
    if (window.lucide) lucide.createIcons();
    
    const bulan = window.Laporan.filterBulan || (new Date().getMonth() + 1);
    const tahun = window.Laporan.filterTahun || new Date().getFullYear();
    
    try {
      let rawData;
      
      // Fetch all data with pagination
      if (type === 'stok' || type === 'penjualan') {
        const allItems = [];
        let page = 1;
        const limit = 200; // API max limit
        let hasMore = true;
        
        while (hasMore) {
          const apiUrl = `/api/v1/${type === 'stok' ? 'stok/realtime' : 'penjualan'}?page=${page}&limit=${limit}&bulan=${bulan}&tahun=${tahun}`;
          const response = await fetch(apiUrl);
          if (!response.ok) throw new Error('Failed to load');
          
          const result = await response.json();
          const items = Array.isArray(result) ? result : (result.data || []);
          allItems.push(...items);
          
          // Check if more pages
          const total = result.pagination?.total || items.length;
          hasMore = page * limit < total && items.length === limit;
          page++;
        }
        
        rawData = allItems;
      } else if (type === 'opname') {
        const apiUrl = `/api/opname-history?bulan=${bulan}&tahun=${tahun}`;
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('Failed to load');
        rawData = await response.json();
      } else {
        const apiUrl = '/api/persediaan';
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('Failed to load');
        rawData = await response.json();
      }
      
      // Store data for download
      window.Laporan.reportData = rawData;
      
      // Generate table based on type
      let html = '';
      
      if (type === 'stok') {
        html = generateStokTable(rawData);
      } else if (type === 'penjualan') {
        html = generatePenjualanTable(rawData);
      } else if (type === 'opname') {
        html = generateOpnameTable(rawData);
      } else if (type === 'export') {
        html = generateExportTable(rawData);
      }
      
      container.innerHTML = html;
      if (window.lucide) lucide.createIcons({ nodes: [container] });
      
    } catch (error) {
      console.error('Error loading report:', error);
      container.innerHTML = `<div class="error-state">Gagal memuat laporan: ${error.message}</div>`;
    }
  }

  function generateStokTable(data) {
    // API returns { success: true, data: [...] } or direct array
    // API fields: sku, nama_produk, kategori, stok_awal, pembelian, penjualan, penyesuaian, stok_akhir
    const items = Array.isArray(data) ? data : (data.data || data.items || []);
    
    if (items.length === 0) {
      return '<div class="empty-state">Tidak ada data stok</div>';
    }
    
    // Calculate totals
    const totalStok = items.reduce((sum, item) => sum + Number(item.stok_akhir || 0), 0);
    
    return `
      <table class="data-table">
        <thead>
          <tr>
            <th>SKU</th>
            <th>Produk</th>
            <th>Kategori</th>
            <th>Stok Awal</th>
            <th> Masuk</th>
            <th>Keluar</th>
            <th>Penyesuaian</th>
            <th>Stok Akhir</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td><code>${item.sku || '-'}</code></td>
              <td>${item.nama_produk || '-'}</td>
              <td>${item.kategori || '-'}</td>
              <td>${formatNumber(item.stok_awal || 0)}</td>
              <td class="text-success">+${formatNumber(item.pembelian || 0)}</td>
              <td class="text-danger">-${formatNumber(item.penjualan || 0)}</td>
              <td>${item.penyesuaian > 0 ? '+' : ''}${formatNumber(item.penyesuaian || 0)}</td>
              <td><strong>${formatNumber(item.stok_akhir || 0)}</strong></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="report-summary">Total: ${items.length} item | Total Stok: ${formatNumber(totalStok)}</div>
    `;
  }

  function generatePenjualanTable(data) {
    // API returns { success: true, data: [...] } or direct array
    // API fields: id, tanggal, nama_outlet, sku, qty, nama_produk, harga_jual, nominal, created_at
    const items = Array.isArray(data) ? data : (data.data || data.items || data.penjualan || []);
    
    if (items.length === 0) {
      return '<div class="empty-state">Tidak ada data penjualan</div>';
    }
    
    // Calculate totals
    const totalQty = items.reduce((sum, item) => sum + Number(item.qty || 0), 0);
    const totalNominal = items.reduce((sum, item) => sum + Number(item.nominal || 0), 0);
    
    return `
      <table class="data-table">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>SKU</th>
            <th>Produk</th>
            <th>Outlet</th>
            <th>Harga</th>
            <th>Qty</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td>${formatDate(item.tanggal || item.created_at)}</td>
              <td><code>${item.sku || '-'}</code></td>
              <td>${item.nama_produk || '-'}</td>
              <td>${item.nama_outlet || '-'}</td>
              <td>${formatCurrency(item.harga_jual)}</td>
              <td>${formatNumber(item.qty || 0)}</td>
              <td><strong>${formatCurrency(item.nominal)}</strong></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="report-summary">Total: ${items.length} transaksi | Qty: ${formatNumber(totalQty)} | Nominal: ${formatCurrency(totalNominal)}</div>
    `;
  }

  function generateOpnameTable(data) {
    // API returns direct array
    const items = Array.isArray(data) ? data : (data.data || data.items || []);
    
    if (items.length === 0) {
      return '<div class="empty-state">Tidak ada data stok opname</div>';
    }
    
    return `
      <table class="data-table">
        <thead>
          <tr>
            <th>Kode SO</th>
            <th>Tanggal</th>
            <th>Lokasi</th>
            <th>Checker</th>
            <th>Item</th>
            <th>Selisih</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => {
            const selisih = item.total_selisih_net || item.total_selisih || 0;
            const selisihClass = selisih > 0 ? 'text-success' : selisih < 0 ? 'text-danger' : '';
            return `
              <tr>
                <td><code>${item.kode_so || '-'}</code></td>
                <td>${formatDate(item.tanggal || item.tanggal_pelaksanaan || item.created_at)}</td>
                <td>${item.lokasi || '-'}</td>
                <td>${item.pic_pelaksana || item.checker || '-'}</td>
                <td>${formatNumber(item.total_item || 0)}</td>
                <td class="${selisihClass}">${selisih > 0 ? '+' : ''}${formatNumber(selisih)}</td>
                <td><span class="badge ${getStatusClass(item.status)}">${getStatusLabel(item.status)}</span></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
      <div class="report-summary">Total: ${items.length} stok opname</div>
    `;
  }

  function generateExportTable(data) {
    // Handle { success: true, data: [...] } format
    const items = Array.isArray(data) ? data : (data.data || data.items || []);
    
    if (items.length === 0) {
      return '<div class="empty-state">Tidak ada data untuk export</div>';
    }
    
    // Get all unique keys from items
    const firstItem = items[0];
    const headers = Object.keys(firstItem).filter(k => !k.startsWith('_') && k !== 'created_at' && k !== 'updated_at');
    
    return `
      <table class="data-table">
        <thead>
          <tr>
            ${headers.map(h => `<th>${formatHeader(h)}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              ${headers.map(h => `<td>${item[h] ?? '-'}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="report-summary">Total: ${items.length} data</div>
    `;
  }

  function formatNumber(num) {
    return num ? num.toLocaleString('id-ID') : '0';
  }

  function formatCurrency(num) {
    if (!num) return 'Rp 0';
    return 'Rp ' + Number(num).toLocaleString('id-ID');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function formatHeader(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  function getStatusClass(status) {
    const map = {
      'menunggu': 'badge--pending',
      'proses': 'badge--process',
      'selesai': 'badge--done',
      'ditolak': 'badge--danger'
    };
    return map[status] || 'badge--pending';
  }

  function getStatusLabel(status) {
    const map = {
      'menunggu': 'Menunggu',
      'proses': 'Proses',
      'selesai': 'Selesai',
      'ditolak': 'Ditolak'
    };
    return map[status] || status;
  }

  function downloadReport(format) {
    const type = window.Laporan.currentReportType;
    const data = window.Laporan.reportData;
    
    if (!data) {
      showToast('Tidak ada data untuk didownload', false);
      return;
    }
    
    // Handle { success: true, data: [...] } format
    let items = Array.isArray(data) ? data : (data.data || data.items || []);
    
    if (!Array.isArray(items) || items.length === 0) {
      showToast('Tidak ada data untuk didownload', false);
      return;
    }
    
    let filename = `laporan_${type}_${new Date().toISOString().split('T')[0]}`;
    
    if (format === 'csv') {
      downloadCSV(items, filename);
    } else if (format === 'xlsx') {
      downloadExcel(items, filename);
    }
    
    showToast(`Download ${format.toUpperCase()} berhasil`);
  }

  function downloadCSV(items, filename) {
    if (items.length === 0) {
      showToast('Tidak ada data', false);
      return;
    }
    
    const headers = Object.keys(items[0]).filter(k => !k.startsWith('_') && !['created_at', 'updated_at', 'id'].includes(k));
    
    const csvContent = [
      headers.map(h => formatHeader(h)),
      ...items.map(item => headers.map(h => {
        const val = item[h];
        if (val === null || val === undefined) return '';
        if (typeof val === 'string' && val.includes(',')) return `"${val}"`;
        return String(val);
      }))
    ].map(row => row.join(',')).join('\n');
    
    const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename + '.csv';
    link.click();
    URL.revokeObjectURL(url);
  }

  function downloadExcel(items, filename) {
    if (items.length === 0) {
      showToast('Tidak ada data', false);
      return;
    }
    
    const headers = Object.keys(items[0]).filter(k => !k.startsWith('_') && !['created_at', 'updated_at', 'id'].includes(k));
    
    // Generate HTML table for Excel
    let html = '<html xmlns:o="urn:schemas-microsoft-com:office" xmlns:x="urn:schemas-microsoft-com:office:excel">';
    html += '<head><meta charset="utf-8"></head><body>';
    html += '<table border="1">';
    
    // Headers
    html += '<thead><tr>' + headers.map(h => `<th>${formatHeader(h)}</th>`).join('') + '</tr></thead>';
    
    // Body
    html += '<tbody>';
    items.forEach(item => {
      html += '<tr>' + headers.map(h => {
        const val = item[h];
        return `<td>${val !== null && val !== undefined ? val : ''}</td>`;
      }).join('') + '</tr>';
    });
    html += '</tbody></table></body></html>';
    
    const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename + '.xls';
    link.click();
    URL.revokeObjectURL(url);
  }

  function printReport() {
    window.print();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  } else {
    if (window.lucide) lucide.createIcons();
  }
</script>
