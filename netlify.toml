[build]
  command = "npm install"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/v1/auth/login/*"
  to = "/.netlify/functions/login"
  status = 200
  force = true

[[redirects]]
  from = "/api/v3-dashboard"
  to = "/.netlify/functions/v3-dashboard"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/outlet-transaksi-summary"
  to = "/.netlify/functions/outlet-transaksi-summary"
  status = 200
  force = true
