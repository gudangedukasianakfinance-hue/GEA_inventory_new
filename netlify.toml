[build]
  command = "npm install"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API redirects - catch all /api/* routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# Also handle without api prefix for function direct access
[[redirects]]
  from = "/.netlify/functions/api"
  to = "/.netlify/functions/api"
  status = 200
