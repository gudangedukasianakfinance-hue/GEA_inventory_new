[build]
  command = "npm install"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/v1/auth/login/admin"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/v1/auth/login/user"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/v1/auth/login"
  to = "/.netlify/functions/login"
  status = 200
